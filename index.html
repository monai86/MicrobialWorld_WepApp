                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 16 }}>
                      <div>
                        <div style={{ fontSize: 12, color: 'var(--accent)', fontWeight: 600, letterSpacing: 1, textTransform: 'uppercase', marginBottom: 8 }}>{g?.emoji} {g?.label || 'Unknown Suite'}</div>
                        <h3 style={{ fontSize: 18, color: '#fff', fontWeight: 600, margin: 0, lineHeight: 1.4 }}>{c.name}</h3>
                        <div style={{ color: 'var(--text3)', fontSize: 12, marginTop: 6, fontWeight: 500 }}>

                      </div>
                    </div>
                    
                    {c.results?.[0] && (
                      <div style={{ background: 'rgba(74,222,128,0.1)', border: '1px solid rgba(74,222,128,0.2)', padding: '12px 16px', borderRadius: 8, marginBottom: 16 }}>

                    <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginTop: 'auto' }}>

                  <div style={{ display: 'flex', borderTop: '1px solid var(--surface-border)', background: 'var(--bg)' }}>
                    <button onClick={() => onLoad({ ...c, step: c.step || 2 })} style={{ flex: 1, padding: '14px', background: 'var(--accent)', border: 'none', borderRight: '1px solid var(--surface-border)', color: '#fff', fontSize: 13, fontWeight: 600, cursor: 'pointer', transition: 'all .2s' }} onMouseEnter={e=>e.currentTarget.style.background='var(--accent-hover)'} onMouseLeave={e=>e.currentTarget.style.background='var(--accent)'}>
                      ▶ Load Case
                    </button>
                    <button onClick={() => rename(c.id, c.name)} style={{ padding: '14px 20px', background: 'transparent', border: 'none', borderRight: '1px solid var(--surface-border)', color: 'var(--text2)', cursor: 'pointer', transition: 'all .2s' }} onMouseEnter={e=>e.currentTarget.style.color='#fff'} onMouseLeave={e=>e.currentTarget.style.color='var(--text2)'} title="Rename Case">
                      ✏️ Edit
                    </button>
                    <button onClick={() => del(c.id)} style={{ padding: '14px 20px', background: 'transparent', border: 'none', color: 'var(--red)', cursor: 'pointer', opacity: 0.8, transition: 'all .2s' }} onMouseEnter={e=>e.currentTarget.style.opacity='1'} onMouseLeave={e=>e.currentTarget.style.opacity='0.8'} title="Delete Case">
                      🗑️
                    </button>
                  </div>
                </div>
              );
            })}
          </div>

          {/* Custom Delete Confirmation Modal */}
          {deleteConfirm && (
            <div style={{ position: 'fixed', inset: 0, background: 'rgba(0, 0, 0, 0.7)', backdropFilter: 'blur(8px)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 9999, animation: 'fadeIn 0.2s ease-out' }}>
              <div style={{ background: 'rgba(17, 24, 39, 0.95)', border: '1px solid rgba(255, 255, 255, 0.1)', borderRadius: 20, padding: 32, width: '90%', maxWidth: 400, boxShadow: '0 25px 50px -12px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 255, 255, 0.05) inset', animation: 'modalSlideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1)' }}>
                <div style={{ textAlign: 'center' }}>
                  <div style={{ fontSize: 48, marginBottom: 16 }}>🗑️</div>
                  <h3 style={{ fontSize: 20, fontWeight: 700, color: '#fff', marginBottom: 8, letterSpacing: '-0.5px' }}>ยืนยันลบเคสนี้?</h3>
                  <p style={{ fontSize: 13, color: '#94a3b8', marginBottom: 24, lineHeight: 1.6 }}>คุณต้องการลบเคสนี้หรือไม่? การกระทำนี้ไม่สามารถย้อนกลับได้</p>
                  <div style={{ display: 'flex', gap: 12, justifyContent: 'center' }}>
                    <button onClick={() => setDeleteConfirm(null)} style={{ padding: '12px 24px', borderRadius: 12, fontSize: 14, fontWeight: 600, cursor: 'pointer', background: 'rgba(255, 255, 255, 0.05)', border: '1px solid rgba(255, 255, 255, 0.1)', color: '#94a3b8', transition: 'all 0.2s' }} onMouseEnter={e => e.currentTarget.style.background = 'rgba(255, 255, 255, 0.1)'} onMouseLeave={e => e.currentTarget.style.background = 'rgba(255, 255, 255, 0.05)'}>
                      ยกเลิก
                    </button>
                    <button onClick={confirmDelete} style={{ padding: '12px 24px', borderRadius: 12, fontSize: 14, fontWeight: 600, cursor: 'pointer', background: 'linear-gradient(135deg, #ef4444 0%, #dc2626 100%)', border: 'none', color: '#fff', boxShadow: '0 4px 14px rgba(239, 68, 68, 0.3)', transition: 'all 0.2s' }} onMouseEnter={e => { e.currentTarget.style.background = 'linear-gradient(135deg, #f87171 0%, #ef4444 100%)'; e.currentTarget.style.transform = 'translateY(-2px)'; }} onMouseLeave={e => { e.currentTarget.style.background = 'linear-gradient(135deg, #ef4444 0%, #dc2626 100%)'; e.currentTarget.style.transform = 'translateY(0)'; }}>
                      ตกลง
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // PAGE: SETTINGS
    // ══════════════════════════════════════
    function SettingsPage({ settings, saveSettings, user, showAlert }) {
      const [displayName, setDisplayName] = useState(settings.displayName || '');
      const [defaultGram, setDefaultGram] = useState(settings.defaultGram || '');
      const [autoSave, setAutoSave] = useState(settings.autoSave !== false);
      const [saving, setSaving] = useState(false);
      const [showPasswordForm, setShowPasswordForm] = useState(false);
      const [currentPwd, setCurrentPwd] = useState('');
      const [newPwd, setNewPwd] = useState('');
      const [confirmNewPwd, setConfirmNewPwd] = useState('');
      const [pwdError, setPwdError] = useState('');
      const [changingPwd, setChangingPwd] = useState(false);

      const handleSave = async () => {
        setSaving(true);
        
        // Update Firebase user profile if display name changed
        if (user && displayName !== settings.displayName) {
          try {
            await user.updateProfile({ displayName: displayName.trim() });
            await user.reload();
          } catch (e) {
            console.error('Error updating display name:', e);
          }
        }
        
        await saveSettings({
          ...settings,
          displayName,
          defaultGram,
          autoSave
        });
        setSaving(false);
        showAlert('✅ บันทึกสำเร็จ', 'การตั้งค่าของคุณถูกบันทึกเรียบร้อยแล้ว');
      };

      const handleReset = async () => {
        setDefaultGram('');
        setAutoSave(true);
        await saveSettings({
          displayName,
          defaultGram: '',
          autoSave: true
        });
        showAlert('✅ รีเซ็ตสำเร็จ', 'การตั้งค่าถูกคืนค่าเริ่มต้นแล้ว');
      };

      const handleChangePassword = async () => {
        setPwdError('');
        if (!currentPwd || !newPwd || !confirmNewPwd) {
          setPwdError('กรุณากรอกรหัสผ่านให้ครบทุกช่อง');
          return;
        }
        if (newPwd !== confirmNewPwd) {
          setPwdError('รหัสผ่านใหม่และการยืนยันรหัสผ่านไม่ตรงกัน');
          return;
        }
        if (newPwd.length < 6) {
          setPwdError('รหัสผ่านใหม่ต้องมีอย่างน้อย 6 ตัวอักษร');
          return;
        }

        setChangingPwd(true);
        try {
          const credential = firebase.auth.EmailAuthProvider.credential(user.email, currentPwd);
          await user.reauthenticateWithCredential(credential);
          await user.updatePassword(newPwd);
          setCurrentPwd('');
          setNewPwd('');
          setConfirmNewPwd('');
          setShowPasswordForm(false);
          showAlert('✅ เปลี่ยนรหัสผ่านสำเร็จ', 'รหัสผ่านของคุณถูกเปลี่ยนเรียบร้อยแล้ว');
        } catch (error) {
          console.error('Password change error:', error);
          if (error.code === 'auth/wrong-password') {
            setPwdError('รหัสผ่านปัจจุบันไม่ถูกต้อง');
          } else if (error.code === 'auth/weak-password') {
            setPwdError('รหัสผ่านใหม่อ่อนเกินไป');
          } else {
            setPwdError('เกิดข้อผิดพลาดในการเปลี่ยนรหัสผ่าน: ' + error.message);
          }
        }
        setChangingPwd(false);
      };

      return (

                      }}>{category.tests.length} tests</span>
                    </div>

                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(520px, 1fr))', gap: 12 }}>
                      {category.tests.map((test) => (
                        <div key={test.id} style={{
                          background: '#132040',
                          border: `1px solid ${category.color}25`,
                          borderRadius: 12,
                          overflow: 'hidden',
                          transition: 'all 0.2s'
                        }}>
                          {/* Header */}
                          <div 
                            onClick={() => toggleExpand(test.id)}
                            style={{
                              padding: '14px 18px',
                              cursor: 'pointer',
                              display: 'flex',
                              justifyContent: 'space-between',
                              alignItems: 'flex-start'
                            }}
                          >
                            <div>
                              <div style={{ fontSize: 13, color: category.color, fontWeight: 600, marginBottom: 3 }}>{test.id}</div>
                              <div style={{ fontSize: 14, fontWeight: 700, color: '#e2e8f0' }}>{test.name}</div>
                              <div style={{ fontSize: 12, color: '#64748b', marginTop: 2 }}>{test.thai}</div>
                            </div>
                            <span style={{
                              color: category.color,
                              fontSize: 18,
                              transform: expanded[test.id] ? 'rotate(180deg)' : 'none',
                              transition: 'transform 0.2s'
                            }}>▼</span>
                          </div>

                          {/* Expanded Content */}
                          {expanded[test.id] && (
                            <div style={{ 
                              padding: '0 18px 16px',
                              borderTop: `1px solid ${category.color}15`
                            }}>
                              <div style={{ display: 'flex', flexDirection: 'column', gap: 10, marginTop: 12 }}>
                                {/* Principle */}
                                <div>
                                  <div style={{ fontSize: 11, color: category.color, fontWeight: 600, marginBottom: 4, textTransform: 'uppercase', letterSpacing: 0.5 }}>หลักการ (Principle)</div>
                                  <p style={{ color: '#94a3b8', fontSize: 12, lineHeight: 1.6 }}>{test.principle}</p>
                                </div>

                                {/* Media & Reagents */}
                                {(test.media || test.reagent || test.reagents) && (
                                  <div style={{ 
                                    background: 'rgba(59,130,246,0.1)', 
                                    border: '1px solid rgba(59,130,246,0.2)',
                                    borderRadius: 8,
                                    padding: '10px 12px'
                                  }}>
                                    {test.media && <p style={{ color: '#93c5fd', fontSize: 11 }}><strong>Media:</strong> {test.media}</p>}
                                    {test.reagent && <p style={{ color: '#93c5fd', fontSize: 11, marginTop: 4 }}><strong>Reagent:</strong> {test.reagent}</p>}
                                    {test.reagents && <p style={{ color: '#93c5fd', fontSize: 11, marginTop: 4 }}><strong>Reagents:</strong> {typeof test.reagents === 'string' ? test.reagents : Object.values(test.reagents).join('; ')}</p>}
                                  </div>
                                )}

                                {/* Procedure */}
                                {test.procedure && (
                                  <div>
                                    <div style={{ fontSize: 11, color: '#64748b', fontWeight: 600, marginBottom: 3 }}>วิธีทำ (Procedure)</div>
                                    <p style={{ color: '#94a3b8', fontSize: 12 }}>{test.procedure}</p>
                                  </div>
                                )}

                                {/* Results */}
                                {(test.positive || test.rapid || test.sensitive) && (
                                  <div style={{ 
                                    background: 'rgba(34,197,94,0.1)', 
                                    border: '1px solid rgba(34,197,94,0.2)',
                                    borderRadius: 8,
                                    padding: '10px 12px'
                                  }}>
                                    <div style={{ fontSize: 11, color: '#22c55e', fontWeight: 700, marginBottom: 3 }}>✓ Positive / Sensitive</div>
                                    {test.positive && <p style={{ color: '#86efac', fontSize: 12 }}>{test.positive}</p>}
                                    {test.rapid && <p style={{ color: '#86efac', fontSize: 12 }}>{test.rapid}</p>}
                                    {test.sensitive && <p style={{ color: '#86efac', fontSize: 12 }}>{test.sensitive}</p>}
                                  </div>
                                )}
                                
                                {(test.negative || test.resistant) && (
                                  <div style={{ 
                                    background: 'rgba(239,68,68,0.1)', 
                                    border: '1px solid rgba(239,68,68,0.2)',
                                    borderRadius: 8,
                                    padding: '10px 12px'
                                  }}>
                                    <div style={{ fontSize: 11, color: '#ef4444', fontWeight: 700, marginBottom: 3 }}>✗ Negative / Resistant</div>
                                    {test.negative && <p style={{ color: '#fca5a5', fontSize: 12 }}>{test.negative}</p>}
                                    {test.resistant && <p style={{ color: '#fca5a5', fontSize: 12 }}>{test.resistant}</p>}
                                  </div>
                                )}

                                {/* Interpretation Legend */}
                                {test.interpretation_legend && (
                                  <div style={{ background: 'rgba(245,158,11,0.1)', border: '1px solid rgba(245,158,11,0.2)', borderRadius: 8, padding: '10px 12px' }}>
                                    <div style={{ fontSize: 11, color: '#f59e0b', fontWeight: 700 }}>📋 Interpretation Key</div>
                                    <p style={{ color: '#fcd34d', fontSize: 11, marginTop: 4 }}>{test.interpretation_legend}</p>
                                  </div>
                                )}

                                {/* Examples */}
                                {test.examples && (
                                  <div style={{ background: 'rgba(139,92,246,0.1)', border: '1px solid rgba(139,92,246,0.2)', borderRadius: 8, padding: '10px 12px' }}>
                                    <div style={{ fontSize: 11, color: '#a78bfa', fontWeight: 700 }}>💡 Examples</div>
                                    <p style={{ color: '#c4b5fd', fontSize: 11, marginTop: 4 }}>{test.examples}</p>
                                  </div>
                                )}

                                {/* Significance */}
                                {test.significance && (
                                  <div>
                                    <div style={{ fontSize: 11, color: '#f59e0b', fontWeight: 600, marginBottom: 3 }}>ความสำคัญ (Significance)</div>
                                    <p style={{ color: '#fcd34d', fontSize: 12 }}>{test.significance}</p>
                                  </div>
                                )}

                                {/* Organisms */}
                                {test.organisms && (
                                  <div>
                                    <div style={{ fontSize: 11, color: '#60a5fa', fontWeight: 600, marginBottom: 3 }}>เชื้อที่เกี่ยวข้อง</div>
                                    <p style={{ color: '#93c5fd', fontSize: 12, fontStyle: 'italic' }}>{test.organisms}</p>
                                  </div>
                                )}

                                {/* Incubation */}
                                {test.incubation && (
                                  <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                                    <span style={{ fontSize: 11, color: '#64748b', fontWeight: 600 }}>🌡️ Incubation:</span>
                                    <span style={{ color: '#94a3b8', fontSize: 12 }}>{test.incubation}</span>
                                  </div>
                                )}

                                {/* QC */}
                                {test.qc && (
                                  <div style={{ background: 'rgba(16,185,129,0.1)', border: '1px solid rgba(16,185,129,0.2)', borderRadius: 8, padding: '8px 12px' }}>
                                    <div style={{ fontSize: 11, color: '#10b981', fontWeight: 700 }}>✓ QC Reference</div>
                                    <p style={{ color: '#6ee7b7', fontSize: 11, marginTop: 3 }}>{test.qc}</p>
                                  </div>
                                )}

                                {/* Critical Notes */}
                                {test.critical_note && (
                                  <div style={{ background: 'rgba(239,68,68,0.15)', border: '1px solid rgba(239,68,68,0.3)', borderRadius: 8, padding: '10px 12px' }}>
                                    <div style={{ fontSize: 11, color: '#ef4444', fontWeight: 700 }}>⚠️ Critical Note</div>
                                    <p style={{ color: '#fca5a5', fontSize: 11, marginTop: 3 }}>{test.critical_note}</p>
                                  </div>
                                )}

                                {/* Important Notes */}
                                {test.important_note && (
                                  <div style={{ background: 'rgba(245,158,11,0.15)', border: '1px solid rgba(245,158,11,0.3)', borderRadius: 8, padding: '10px 12px' }}>
                                    <div style={{ fontSize: 11, color: '#f59e0b', fontWeight: 700 }}>⚠️ Important</div>
                                    <p style={{ color: '#fcd34d', fontSize: 11, marginTop: 3 }}>{test.important_note}</p>
                                  </div>
                                )}
                              </div>
                            </div>
                          )}
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* pH Indicators Tab */}
            {activeTab === 'indicators' && (
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(300px, 1fr))', gap: 12 }}>
                {PH_INDICATORS_DATA.map((ind, i) => (
                  <div key={i} style={{ background: '#132040', border: '1px solid #1e3055', borderRadius: 12, padding: 16 }}>
                    <div style={{ fontSize: 15, fontWeight: 700, color: '#f59e0b', marginBottom: 8 }}>{ind.name}</div>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                      <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                        <span style={{ color: '#64748b', fontSize: 12 }}>pH Range:</span>
                        <span style={{ color: '#e2e8f0', fontSize: 12 }}>{ind.pH}</span>
                      </div>
                      <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                        <span style={{ color: '#64748b', fontSize: 12 }}>Acid:</span>
                        <span style={{ color: '#fde047', fontSize: 12 }}>{ind.acid}</span>
                      </div>
                      <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                        <span style={{ color: '#64748b', fontSize: 12 }}>Alkaline:</span>
                        <span style={{ color: '#93c5fd', fontSize: 12 }}>{ind.alkaline}</span>
                      </div>
                      <div style={{ marginTop: 8, paddingTop: 8, borderTop: '1px solid #1e3055' }}>
                        <span style={{ color: '#64748b', fontSize: 11 }}>Used for: </span>
                        <span style={{ color: '#94a3b8', fontSize: 11 }}>{ind.used}</span>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* Reagent Storage Tab */}
            {activeTab === 'storage' && (
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(280px, 1fr))', gap: 12 }}>
                {REAGENT_STORAGE.map((item, i) => (
                  <div key={i} style={{ background: '#132040', border: '1px solid #1e3055', borderRadius: 12, padding: 16, display: 'flex', alignItems: 'center', gap: 12 }}>
                    <div style={{ fontSize: 24 }}>🧪</div>
                    <div>
                      <div style={{ fontSize: 14, fontWeight: 600, color: '#e2e8f0' }}>{item.reagent}</div>
                      <div style={{ fontSize: 12, color: '#64748b', marginTop: 2 }}>Storage: <span style={{ color: '#a78bfa' }}>{item.storage}</span></div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);


  </script>
</body>

</html>
