                                <td style={{ padding: '5px 8px', color: '#64748b', fontSize: 10 }}>{row.n}</td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                        </div>
                      </InfoCard>
                    </div>
                  )}
                  {tab === 'notes' && (
                    <InfoCard title="📝 Clinical Notes & Key Points" color={selGrp?.color}>
                      <p style={{ color: '#94a3b8', fontSize: 12, lineHeight: 1.8, marginTop: 8 }}>{selBug.notes}</p>
                    </InfoCard>
                  )}
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ══════════════════════════════════════
    // PAGE: WORKFLOW
    // ══════════════════════════════════════
    const GRAM_OPTIONS = [
      { id: 'gpc_cluster', label: 'GPC in clusters (เช่น Staphylococcus)', color: '#c084fc' },
      { id: 'gpc_chain', label: 'GPC in chains (เช่น Streptococcus)', color: '#4ade80' },
      { id: 'gpc_diplo', label: 'GP Diplococci (lancet-shaped)', color: '#34d399' },
      { id: 'gpb', label: 'GP Bacilli (Gram positive รูปแท่ง)', color: '#fb923c' },
      { id: 'gnb_oxi_neg', label: 'GN Rods + Oxidase − (Enterobacterales)', color: '#f87171' },
      { id: 'gnb_oxi_pos_tcbs', label: 'GN Rods + Oxidase + + TCBS+ (Vibrio)', color: '#38bdf8' },
      { id: 'gnb_oxi_pos_nfb', label: 'GN Rods + Oxidase + + TSI K/N (NFB)', color: '#22d3ee' },
      { id: 'gn_diplo', label: 'GN Diplococci/Coccobacilli', color: '#a3e635' },
    ];
    const GROUP_MAP = { gpc_cluster: 'gpc_cluster', gpc_chain: 'gpc_chain', gpc_diplo: 'gpc_chain', gpb: 'gpb', gnb_oxi_neg: 'enterobacterales', gnb_oxi_pos_tcbs: 'vibrio', gnb_oxi_pos_nfb: 'nfb', gn_diplo: 'gn_coccobacilli' };

    function WorkflowPage({ initData, setWfData, showPrompt, showAlert, user, isGuest }) {
      const [step, setStep] = useState(initData?.step || 1);
      const [gramSel, setGramSel] = useState(initData?.gramSel || null);
      const [answers, setAnswers] = useState(initData?.answers || {});
      const [results, setResults] = useState(initData?.results || null);
      const [caseName, setCaseName] = useState(initData?.caseName || '');

      const dbGroup = gramSel ? GROUP_MAP[gramSel] : null;
      const suite = dbGroup ? SUITES[dbGroup] : null;

      const setCurrent = () => {
        const data = { step, gramSel, answers, results, caseName };
        setWfData(data);
      };

      const executeSave = async (finalName) => {
        if (!finalName || !finalName.trim()) return;
        setCaseName(finalName);
        const id = Date.now();
        const entry = { id, name: finalName, date: new Date().toLocaleDateString('th-TH'), gramSel, answers, results, step };

        // Save to LocalStorage (only if not guest mode)
        if (!isGuest) {
          const saved = JSON.parse(localStorage.getItem('mbcases') || '[]');
          saved.unshift(entry);
          localStorage.setItem('mbcases', JSON.stringify(saved.slice(0, 50)));
        }

        // Save to Firestore if available
        if (isFirebaseActive && user) {
          try {
            await db.collection('users').doc(user.uid).collection('cases').doc(id.toString()).set(entry);
          } catch (e) { console.error('Firestore save error', e); }
        }

        if (showAlert) showAlert('✅ บันทึกสำเร็จ', isGuest ? `ข้อมูลของเคส "${finalName}" ถูกบันทึกไว้ในเซสชันนี้เท่านั้น (Guest Mode)` : `ข้อมูลของเคส "${finalName}" ถูกบันทึกลงระบบเรียบร้อยแล้วครับ!`);
        else alert('บันทึก Case เรียบร้อย!');
      };

      const saveCase = () => {
        let finalName = caseName;
        if (!finalName.trim()) {
          showPrompt('ตั้งชื่อ Case สำหรับบันทึก:', 'Case ' + new Date().toLocaleTimeString('th-TH'), (name) => {
            executeSave(name);
          });
        } else {
          executeSave(finalName);
        }
      };

      const runAnalysis = () => {
        if (!dbGroup) return;
        const r = calcProbability(dbGroup, answers);
        setResults(r);
        setStep(3);
      };

      const reset = () => { setStep(1); setGramSel(null); setAnswers({}); setResults(null); setCaseName(''); };

      return (
        <div style={{ display: 'flex', flexDirection: 'column', height: 'calc(100vh - 56px)' }}>
          {/* Progress Stepper */}
          <div className="progress-bar" style={{ flexShrink: 0 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, maxWidth: 800, margin: '0 auto' }}>
              {[{ n: 1, l: 'Gram Stain / Primary', icon: '🔬' }, { n: 2, l: 'Biochemical Tests', icon: '⚗️' }, { n: 3, l: 'ผลการวินิจฉัย', icon: '📊' }].map((s, i, arr) => (
                <React.Fragment key={s.n}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                    <div className={`step-indicator ${step >= s.n ? 'done' : 'pending'}`}>
                      {step > s.n ? '✓' : s.n}
                    </div>
                    <span style={{ fontSize: 12, color: step === s.n ? '#e2e8f0' : '#64748b', fontWeight: step === s.n ? 700 : 400 }}>{s.l}</span>
                  </div>
                  {i < arr.length - 1 && <div style={{ flex: 1, height: 1, background: step > s.n ? 'rgba(99,102,241,0.3)' : 'rgba(255,255,255,0.06)' }} />}
                </React.Fragment>
              ))}
              <button onClick={reset} className="btn-action secondary" style={{ marginLeft: 'auto', padding: '6px 14px', fontSize: 12 }}>🔄 เริ่มใหม่</button>
            </div>
          </div>

          <div style={{ flex: 1, overflowY: 'auto', padding: '24px 20px' }} className="fade-in">
            <div style={{ maxWidth: 800, margin: '0 auto', width: '100%' }}>
            {/* STEP 1 */}
            {step === 1 && (
              <div>
                <h2 style={{ fontSize: 20, fontWeight: 800, color: '#fff', marginBottom: 6, letterSpacing: '-0.5px' }}>🔬 Step 1 — Gram Stain & Primary Identification</h2>
                <p style={{ color: '#64748b', fontSize: 13, marginBottom: 24, lineHeight: 1.5 }}>เลือกผลที่ได้จากการย้อม Gram stain และ primary biochemical tests (Catalase / Oxidase)</p>
                <div style={{ display: 'grid', gap: 8 }}>
                  {GRAM_OPTIONS.map(opt => (
                    <button key={opt.id} onClick={() => { setGramSel(opt.id); setAnswers({}); }}
                      className={`gram-card ${gramSel === opt.id ? 'selected' : ''}`}
                      style={gramSel === opt.id ? { background: `${opt.color}12`, borderColor: opt.color, color: opt.color } : {}}>
                      <div className="gram-indicator" style={gramSel === opt.id ? { background: opt.color } : {}}>
                        {gramSel === opt.id && <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>}
                      </div>
                      {opt.label}
                    </button>
                  ))}
                </div>
                {gramSel && (
                  <div style={{ marginTop: 24 }}>
                    <InfoCard title="💡 Suite ที่แนะนำ" color="#6366f1">
                      <p style={{ color: '#94a3b8', fontSize: 13, marginTop: 6 }}>{suite?.name || 'ไม่พบ suite สำหรับกลุ่มนี้'}</p>
                      <p style={{ color: '#64748b', fontSize: 11, marginTop: 4 }}>Trigger: {suite?.trigger}</p>
                    </InfoCard>
                    <button onClick={() => setStep(2)} className="btn-action primary" style={{ marginTop: 16, width: '100%', padding: '14px 28px', fontSize: 15 }}>
                      ดำเนินการต่อ → กรอกผล Biochemical Tests
                    </button>
                  </div>
                )}
              </div>
            )}

            {/* STEP 2 */}
            {step === 2 && suite && (
              <div>
                <h2 style={{ fontSize: 20, fontWeight: 800, color: '#fff', marginBottom: 6, letterSpacing: '-0.5px' }}>⚗️ Step 2 — {suite.name}</h2>
                <p style={{ color: '#64748b', fontSize: 13, marginBottom: 20, lineHeight: 1.5 }}>กรอกผลการทดสอบให้มากที่สุดเท่าที่มี (ข้ามได้ถ้ายังไม่ได้ทำ)</p>
                <div style={{ marginBottom: 20 }}>
                  <label style={{ fontSize: 12, color: '#94a3b8', display: 'block', marginBottom: 6, fontWeight: 500 }}>📋 ชื่อ Case (สำหรับบันทึก)</label>
                  <input value={caseName} onChange={e => setCaseName(e.target.value)} placeholder="เช่น Case 001 — ผู้ป่วย UTI" className="input-field" style={{ fontSize: 13 }} />
                </div>
                <div style={{ display: 'grid', gap: 8 }}>
                  {suite.tests.map((test, idx) => (
                    <div key={test.id} className={`wf-test-card ${answers[test.id] ? 'answered' : ''}`}>
                      <div className="wf-test-label"><span className="idx">{idx + 1}</span> {test.label}</div>
                      <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                        <button onClick={() => setAnswers(a => ({ ...a, [test.id]: undefined }))}
                          className={`wf-opt-btn skip ${!answers[test.id] ? 'selected' : ''}`}>— ยังไม่ทำ</button>
                        {test.options.map(opt => (
                          <button key={opt} onClick={() => setAnswers(a => ({ ...a, [test.id]: opt }))}
                            className={`wf-opt-btn ${answers[test.id] === opt ? 'selected' : ''}`}>{opt}</button>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
                <div style={{ display: 'flex', gap: 10, marginTop: 24 }}>
                  <button onClick={() => setStep(1)} className="btn-action secondary">← ย้อนกลับ</button>
                  <button onClick={runAnalysis} className="btn-action primary" style={{ flex: 1 }}>
                    🔍 วิเคราะห์ผล (Identify Organism)
                  </button>
                  <button onClick={saveCase} className="btn-action save">💾 บันทึก</button>
                </div>
              </div>
            )}

            {/* STEP 3 */}
            {step === 3 && results && (
              <div>
                <h2 style={{ fontSize: 20, fontWeight: 800, color: '#fff', marginBottom: 6, letterSpacing: '-0.5px' }}>📊 Step 3 — ผลการวินิจฉัย</h2>
                <p style={{ color: '#64748b', fontSize: 13, marginBottom: 24, lineHeight: 1.5 }}>คะแนนความน่าจะเป็นในการจำแนกชนิดเชื้อ จากผล biochemical ที่กรอก</p>
                <div style={{ display: 'grid', gap: 12 }}>
                  {results.slice(0, 5).map((bug, i) => {
                    const g = GROUPS.find(x => x.id === bug.group);
                    return (
                      <div key={bug.id} className={`result-card ${i === 0 ? 'top' : ''}`} style={i === 0 ? { borderColor: `${g?.color}44` } : {}}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 14, marginBottom: 10 }}>
                          <div style={{ width: 40, height: 40, borderRadius: 12, background: `${g?.color}18`, border: `1px solid ${g?.color}33`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 15, fontWeight: 800, color: g?.color, flexShrink: 0 }}>#{i + 1}</div>
                          <div style={{ flex: 1, minWidth: 0 }}>
                            <div style={{ fontSize: 14, fontWeight: 700, fontStyle: 'italic', color: i === 0 ? g?.color : '#e2e8f0', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{bug.name}</div>
                            {bug.thai && <div style={{ fontSize: 11, color: '#64748b', marginTop: 1 }}>{bug.thai}</div>}
                          </div>
                          <div style={{ textAlign: 'right', flexShrink: 0 }}>
                            <div style={{ fontSize: 22, fontWeight: 800, color: bug.pct >= 70 ? '#4ade80' : bug.pct >= 40 ? '#fbbf24' : '#f87171', lineHeight: 1 }}>{bug.pct}%</div>
                            <div style={{ fontSize: 9, color: '#64748b', marginTop: 2 }}>probability</div>
                          </div>
                        </div>
                        <div style={{ background: 'rgba(0,0,0,0.3)', borderRadius: 8, height: 6, overflow: 'hidden' }}>
                          <div style={{ height: '100%', width: `${bug.pct}%`, background: bug.pct >= 70 ? 'linear-gradient(90deg,#4ade80,#22d3ee)' : bug.pct >= 40 ? 'linear-gradient(90deg,#fbbf24,#fb923c)' : '#f87171', transition: 'width .6s cubic-bezier(.4,0,.2,1)', borderRadius: 8 }} />
                        </div>
                        {i === 0 && bug.pct >= 50 && (
                          <div style={{ marginTop: 12, background: 'rgba(99,102,241,.08)', border: '1px solid rgba(99,102,241,.2)', borderRadius: 10, padding: '10px 14px' }}>
                            <div style={{ fontSize: 10, fontWeight: 700, color: '#818cf8', marginBottom: 4, letterSpacing: 0.5 }}>KEY POINTS</div>
                            <p style={{ fontSize: 12, color: '#94a3b8', lineHeight: 1.6 }}>{bug.notes?.substring(0, 200)}...</p>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
                <div style={{ display: 'flex', gap: 10, marginTop: 24 }}>
                  <button onClick={() => setStep(2)} className="btn-action secondary">← แก้ไขผล</button>
                  <button onClick={saveCase} className="btn-action save" style={{ flex: 1 }}>💾 บันทึก Case นี้</button>
                  <button onClick={reset} className="btn-action primary" style={{ flex: 0 }}>🔄 Case ใหม่</button>
                </div>
              </div>
            )}
            </div>
          </div>
        </div>
      );
    }

    // ══════════════════════════════════════
    // PAGE: SAVED CASES
    // ══════════════════════════════════════
    function CasesPage({ onLoad, showPrompt, user, isGuest }) {
      const [cases, setCases] = useState(() => isGuest ? [] : JSON.parse(localStorage.getItem('mbcases') || '[]'));
      const [loading, setLoading] = useState(false);
      const [deleteConfirm, setDeleteConfirm] = useState(null);

      useEffect(() => {
        if (isGuest) {
          setCases([]);
          return;
        }
        if (isFirebaseActive && user) {
          setLoading(true);
          db.collection('users').doc(user.uid).collection('cases').orderBy('id', 'desc').get().then(snap => {
            const cloudCases = snap.docs.map(doc => doc.data());
            setCases(cloudCases);
            localStorage.setItem('mbcases', JSON.stringify(cloudCases));
            setLoading(false);
          }).catch(e => {
            console.error(e); setLoading(false);
          });
        }
      }, [user, isGuest]);

      const del = async id => {
        setDeleteConfirm(id);
      };

      const confirmDelete = async () => {
        if (!deleteConfirm) return;
        const updated = cases.filter(c => c.id !== deleteConfirm);
        setCases(updated);
        if (!isGuest) {
          localStorage.setItem('mbcases', JSON.stringify(updated));
        }
        if (isFirebaseActive && user) {
          try { await db.collection('users').doc(user.uid).collection('cases').doc(deleteConfirm.toString()).delete(); } catch (e) { }
        }
        setDeleteConfirm(null);
      };

      const rename = (id, oldName) => {
        showPrompt('แก้ไขชื่อ Case:', oldName, async (newName) => {
          if (!newName || !newName.trim()) return;
          const t = newName.trim();
          const updated = cases.map(c => c.id === id ? { ...c, name: t } : c);
          setCases(updated);
          if (!isGuest) {
            localStorage.setItem('mbcases', JSON.stringify(updated));
          }
          if (isFirebaseActive && user) {
            try { await db.collection('users').doc(user.uid).collection('cases').doc(id.toString()).update({ name: t }); } catch (e) { }
          }
        });
      };

      const EmptyState = () => (
        <div style={{ textAlign: 'center', padding: '80px 20px', background: 'rgba(255,255,255,0.02)', border: '1px dashed var(--surface-border)', borderRadius: '16px', marginTop: 40, maxWidth: 800, margin: '40px auto 0' }}>
          <div style={{ fontSize: 56, marginBottom: 16 }}>📂</div>
          <h3 style={{ color: '#fff', fontSize: 18, fontWeight: 600 }}>ยังไม่มีเคสที่ถูกบันทึกไว้</h3>
          <p style={{ color: 'var(--text2)', fontSize: 14, marginTop: 8 }}>ข้อมูลเชื้อที่คุณเลือกบันทึกจะถูกเก็บรวบรวมไว้ที่นี่</p>
        </div>
      );

      return (
        <div className="fade-in cases-container" style={{ padding: '40px', maxWidth: 1200, margin: '0 auto', height: 'calc(100vh - 60px)', overflowY: 'auto' }}>
          <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', marginBottom: 32, paddingBottom: 20, borderBottom: '1px solid var(--surface-border)' }}>
            <div>
              <h2 style={{ fontSize: 26, fontWeight: 700, color: '#fff', letterSpacing: '-0.5px' }}>
                Case ที่บันทึกไว้
              </h2>
              <p style={{ color: 'var(--text3)', fontSize: 13, marginTop: 6, fontWeight: 500, letterSpacing: 0.5, textTransform: 'uppercase' }}>
                {isGuest ? '👤 Guest Mode (No Persistence)' : (user ? '☁️ Cloud Sync Active' : '💾 Local Storage')}
              </p>
            </div>
            <div style={{ color: 'var(--text2)', fontSize: 14, fontWeight: 600 }}>ทั้งหมด {cases.length} เคส</div>
          </div>

          {loading && <div style={{ textAlign: 'center', color: 'var(--accent)', padding: 40, fontWeight: 600 }}>กำลังดึงข้อมูลจากระบบ Cloud...</div>}

          {!loading && cases.length === 0 && <EmptyState />}
          
          <div className="cases-grid" style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(340px, 1fr))', gap: 24 }}>
            {cases.map(c => {
              const g = GROUPS.find(x => x.id === GROUP_MAP[c.gramSel]);
              return (
                <div key={c.id} style={{ background: 'var(--surface)', border: '1px solid var(--surface-border)', borderRadius: 16, overflow: 'hidden', display: 'flex', flexDirection: 'column', transition: 'all .2s' }} className="fade-in card-hover">
                  <div style={{ padding: '24px', display: 'flex', flexDirection: 'column', flex: 1 }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 16 }}>
                      <div>
                        <div style={{ fontSize: 12, color: 'var(--accent)', fontWeight: 600, letterSpacing: 1, textTransform: 'uppercase', marginBottom: 8 }}>{g?.emoji} {g?.label || 'Unknown Suite'}</div>
                        <h3 style={{ fontSize: 18, color: '#fff', fontWeight: 600, margin: 0, lineHeight: 1.4 }}>{c.name}</h3>
                        <div style={{ color: 'var(--text3)', fontSize: 12, marginTop: 6, fontWeight: 500 }}>
                          📅 {c.date}
                        </div>
                      </div>
                    </div>
                    
                    {c.results?.[0] && (
                      <div style={{ background: 'rgba(74,222,128,0.1)', border: '1px solid rgba(74,222,128,0.2)', padding: '12px 16px', borderRadius: 8, marginBottom: 16 }}>
                        <div style={{ fontSize: 11, color: '#4ade80', textTransform: 'uppercase', fontWeight: 700, letterSpacing: 0.5, marginBottom: 4 }}>Top Match</div>
                        <div style={{ fontSize: 14, color: '#fff', fontWeight: 500 }}><em>{c.results[0].name}</em> <span style={{ color: '#4ade80', fontWeight: 700 }}>({c.results[0].pct}%)</span></div>
                      </div>
                    )}

                    <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginTop: 'auto' }}>
                      {Object.entries(c.answers || {}).slice(0, 5).map(([k, v]) => v && (
                        <span key={k} style={{ background: 'var(--bg)', border: '1px solid var(--surface-border)', borderRadius: 20, padding: '4px 10px', fontSize: 11, color: 'var(--text2)', fontWeight: 500 }}>{k}: <strong style={{color:'#fff'}}>{v}</strong></span>
                      ))}
                      {Object.keys(c.answers || {}).length > 5 && (
                        <span style={{ background: 'var(--bg)', border: '1px solid var(--surface-border)', borderRadius: 20, padding: '4px 10px', fontSize: 11, color: 'var(--text3)', fontWeight: 600 }}>+{Object.keys(c.answers || {}).length - 5} tests</span>
                      )}
                    </div>
                  </div>

                  <div style={{ display: 'flex', borderTop: '1px solid var(--surface-border)', background: 'var(--bg)' }}>
                    <button onClick={() => onLoad({ ...c, step: c.step || 2 })} style={{ flex: 1, padding: '14px', background: 'var(--accent)', border: 'none', borderRight: '1px solid var(--surface-border)', color: '#fff', fontSize: 13, fontWeight: 600, cursor: 'pointer', transition: 'all .2s' }} onMouseEnter={e=>e.currentTarget.style.background='var(--accent-hover)'} onMouseLeave={e=>e.currentTarget.style.background='var(--accent)'}>
                      ▶ Load Case
                    </button>
                    <button onClick={() => rename(c.id, c.name)} style={{ padding: '14px 20px', background: 'transparent', border: 'none', borderRight: '1px solid var(--surface-border)', color: 'var(--text2)', cursor: 'pointer', transition: 'all .2s' }} onMouseEnter={e=>e.currentTarget.style.color='#fff'} onMouseLeave={e=>e.currentTarget.style.color='var(--text2)'} title="Rename Case">
                      ✏️ Edit
                    </button>
                    <button onClick={() => del(c.id)} style={{ padding: '14px 20px', background: 'transparent', border: 'none', color: 'var(--red)', cursor: 'pointer', opacity: 0.8, transition: 'all .2s' }} onMouseEnter={e=>e.currentTarget.style.opacity='1'} onMouseLeave={e=>e.currentTarget.style.opacity='0.8'} title="Delete Case">
                      🗑️
                    </button>
                  </div>
                </div>
              );
            })}
          </div>

          {/* Custom Delete Confirmation Modal */}
          {deleteConfirm && (
            <div style={{ position: 'fixed', inset: 0, background: 'rgba(0, 0, 0, 0.7)', backdropFilter: 'blur(8px)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 9999, animation: 'fadeIn 0.2s ease-out' }}>
              <div style={{ background: 'rgba(17, 24, 39, 0.95)', border: '1px solid rgba(255, 255, 255, 0.1)', borderRadius: 20, padding: 32, width: '90%', maxWidth: 400, boxShadow: '0 25px 50px -12px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 255, 255, 0.05) inset', animation: 'modalSlideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1)' }}>
                <div style={{ textAlign: 'center' }}>
                  <div style={{ fontSize: 48, marginBottom: 16 }}>🗑️</div>
                  <h3 style={{ fontSize: 20, fontWeight: 700, color: '#fff', marginBottom: 8, letterSpacing: '-0.5px' }}>ยืนยันลบเคสนี้?</h3>
                  <p style={{ fontSize: 13, color: '#94a3b8', marginBottom: 24, lineHeight: 1.6 }}>คุณต้องการลบเคสนี้หรือไม่? การกระทำนี้ไม่สามารถย้อนกลับได้</p>
                  <div style={{ display: 'flex', gap: 12, justifyContent: 'center' }}>
                    <button onClick={() => setDeleteConfirm(null)} style={{ padding: '12px 24px', borderRadius: 12, fontSize: 14, fontWeight: 600, cursor: 'pointer', background: 'rgba(255, 255, 255, 0.05)', border: '1px solid rgba(255, 255, 255, 0.1)', color: '#94a3b8', transition: 'all 0.2s' }} onMouseEnter={e => e.currentTarget.style.background = 'rgba(255, 255, 255, 0.1)'} onMouseLeave={e => e.currentTarget.style.background = 'rgba(255, 255, 255, 0.05)'}>
                      ยกเลิก
                    </button>
                    <button onClick={confirmDelete} style={{ padding: '12px 24px', borderRadius: 12, fontSize: 14, fontWeight: 600, cursor: 'pointer', background: 'linear-gradient(135deg, #ef4444 0%, #dc2626 100%)', border: 'none', color: '#fff', boxShadow: '0 4px 14px rgba(239, 68, 68, 0.3)', transition: 'all 0.2s' }} onMouseEnter={e => { e.currentTarget.style.background = 'linear-gradient(135deg, #f87171 0%, #ef4444 100%)'; e.currentTarget.style.transform = 'translateY(-2px)'; }} onMouseLeave={e => { e.currentTarget.style.background = 'linear-gradient(135deg, #ef4444 0%, #dc2626 100%)'; e.currentTarget.style.transform = 'translateY(0)'; }}>
                      ตกลง
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ══════════════════════════════════════
    // PAGE: SETTINGS
    // ══════════════════════════════════════
    function SettingsPage({ settings, saveSettings, user, showAlert }) {
      const [displayName, setDisplayName] = useState(settings.displayName || '');
      const [defaultGram, setDefaultGram] = useState(settings.defaultGram || '');
      const [autoSave, setAutoSave] = useState(settings.autoSave !== false);
      const [saving, setSaving] = useState(false);
      const [showPasswordForm, setShowPasswordForm] = useState(false);
      const [currentPwd, setCurrentPwd] = useState('');
      const [newPwd, setNewPwd] = useState('');
      const [confirmNewPwd, setConfirmNewPwd] = useState('');
      const [pwdError, setPwdError] = useState('');
      const [changingPwd, setChangingPwd] = useState(false);

      const handleSave = async () => {
        setSaving(true);
        
        // Update Firebase user profile if display name changed
        if (user && displayName !== settings.displayName) {
          try {
            await user.updateProfile({ displayName: displayName.trim() });
            await user.reload();
          } catch (e) {
            console.error('Error updating display name:', e);
          }
        }
        
        await saveSettings({
          ...settings,
          displayName,
          defaultGram,
          autoSave
        });
        setSaving(false);
        showAlert('✅ บันทึกสำเร็จ', 'การตั้งค่าของคุณถูกบันทึกเรียบร้อยแล้ว');
      };

      const handleReset = async () => {
        setDefaultGram('');
        setAutoSave(true);
        await saveSettings({
          displayName,
          defaultGram: '',
          autoSave: true
        });
        showAlert('✅ รีเซ็ตสำเร็จ', 'การตั้งค่าถูกคืนค่าเริ่มต้นแล้ว');
      };

      const handleChangePassword = async () => {
        setPwdError('');
        if (!currentPwd || !newPwd || !confirmNewPwd) {
          setPwdError('กรุณากรอกรหัสผ่านให้ครบทุกช่อง');
          return;
        }
        if (newPwd !== confirmNewPwd) {
          setPwdError('รหัสผ่านใหม่และการยืนยันรหัสผ่านไม่ตรงกัน');
          return;
        }
        if (newPwd.length < 6) {
          setPwdError('รหัสผ่านใหม่ต้องมีอย่างน้อย 6 ตัวอักษร');
          return;
        }

        setChangingPwd(true);
        try {
          const credential = firebase.auth.EmailAuthProvider.credential(user.email, currentPwd);
          await user.reauthenticateWithCredential(credential);
          await user.updatePassword(newPwd);
          setCurrentPwd('');
          setNewPwd('');
          setConfirmNewPwd('');
          setShowPasswordForm(false);
          showAlert('✅ เปลี่ยนรหัสผ่านสำเร็จ', 'รหัสผ่านของคุณถูกเปลี่ยนเรียบร้อยแล้ว');
        } catch (error) {
          console.error('Password change error:', error);
          if (error.code === 'auth/wrong-password') {
            setPwdError('รหัสผ่านปัจจุบันไม่ถูกต้อง');
          } else if (error.code === 'auth/weak-password') {
            setPwdError('รหัสผ่านใหม่อ่อนเกินไป');
          } else {
            setPwdError('เกิดข้อผิดพลาดในการเปลี่ยนรหัสผ่าน: ' + error.message);
          }
        }
        setChangingPwd(false);
      };

      return (
        <div className="fade-in" style={{ padding: '40px', maxWidth: 800, margin: '0 auto', height: 'calc(100vh - 60px)', overflowY: 'auto' }}>
          <div style={{ marginBottom: 32, paddingBottom: 20, borderBottom: '1px solid var(--surface-border)' }}>
            <h2 style={{ fontSize: 26, fontWeight: 700, color: '#fff', letterSpacing: '-0.5px', marginBottom: 8 }}>
              ⚙️ ตั้งค่า
            </h2>
            <p style={{ color: 'var(--text3)', fontSize: 13, marginTop: 6, fontWeight: 500, letterSpacing: 0.5, textTransform: 'uppercase' }}>
              {user ? '☁️ Cloud Sync Active' : '💾 Local Storage'}
            </p>
          </div>

          {/* User Info Card */}
          <div style={{ background: 'var(--surface)', border: '1px solid var(--surface-border)', borderRadius: 16, padding: 24, marginBottom: 24 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 16, marginBottom: 20 }}>
              <div style={{ width: 56, height: 56, borderRadius: '50%', background: 'linear-gradient(135deg, #6366f1, #8b5cf6)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 24, fontWeight: 700, color: '#fff' }}>
                {user?.displayName ? user.displayName.charAt(0).toUpperCase() : '?'}
              </div>
              <div>
                <div style={{ fontSize: 18, fontWeight: 600, color: '#fff', marginBottom: 4 }}>{user?.displayName || 'Guest User'}</div>
                <div style={{ fontSize: 13, color: 'var(--text2)' }}>{user?.email || 'Guest Mode'}</div>
              </div>
            </div>

            <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
              <div>
                <label style={{ fontSize: 12, color: 'var(--text2)', display: 'block', marginBottom: 6, fontWeight: 500 }}>ชื่อที่ต้องการแสดง (Display Name)</label>
                <input
                  type="text"
                  value={displayName}
                  onChange={e => setDisplayName(e.target.value)}
                  placeholder="ชื่อของคุณ"
                  className="input-field"
                  style={{ fontSize: 14 }}
                />
              </div>

              <div>
                <label style={{ fontSize: 12, color: 'var(--text2)', display: 'block', marginBottom: 6, fontWeight: 500 }}>อีเมล (Email)</label>
                <input
                  type="email"
                  value={user?.email || ''}
                  disabled
                  className="input-field"
                  style={{ fontSize: 14, opacity: 0.6, cursor: 'not-allowed' }}
                />
              </div>
            </div>
          </div>

          {/* Password Change Card (only for logged-in users with email/password auth) */}
          {user && user.providerData.some(p => p.providerId === 'password') && (
            <div style={{ background: 'var(--surface)', border: '1px solid var(--surface-border)', borderRadius: 16, padding: 24, marginBottom: 24 }}>
              <h3 style={{ fontSize: 16, fontWeight: 600, color: '#fff', marginBottom: 20 }}>ความปลอดภัยบัญชี</h3>

              {!showPasswordForm ? (
                <button
                  onClick={() => setShowPasswordForm(true)}
                  style={{
                    width: '100%',
                    padding: '12px 16px',
                    background: 'var(--bg)',
                    border: '1px solid var(--surface-border)',
                    borderRadius: 8,
                    color: '#fff',
                    fontSize: 14,
                    fontWeight: 500,
                    cursor: 'pointer',
                    transition: 'all 0.2s',
                    display: 'flex',
                    alignItems: 'center',
                    gap: 8
                  }}
                  onMouseEnter={e => e.currentTarget.style.borderColor = 'var(--accent)'}
                  onMouseLeave={e => e.currentTarget.style.borderColor = 'var(--surface-border)'}
                >
                  🔑 เปลี่ยนรหัสผ่าน
                </button>
              ) : (
                <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
                  {pwdError && (
                    <div style={{ background: 'rgba(239,68,68,0.1)', border: '1px solid rgba(239,68,68,0.3)', padding: '10px 14px', borderRadius: 8, color: '#fca5a5', fontSize: 12 }}>
                      ⚠️ {pwdError}
                    </div>
                  )}
                  <div>
                    <label style={{ fontSize: 12, color: 'var(--text2)', display: 'block', marginBottom: 6, fontWeight: 500 }}>รหัสผ่านปัจจุบัน</label>
                    <input
                      type="password"
                      value={currentPwd}
                      onChange={e => setCurrentPwd(e.target.value)}
                      placeholder="รหัสผ่านปัจจุบัน"
                      className="input-field"
                      style={{ fontSize: 14 }}
                    />
                  </div>
                  <div>
                    <label style={{ fontSize: 12, color: 'var(--text2)', display: 'block', marginBottom: 6, fontWeight: 500 }}>รหัสผ่านใหม่ (อย่างน้อย 6 ตัวอักษร)</label>
                    <input
                      type="password"
                      value={newPwd}
                      onChange={e => setNewPwd(e.target.value)}
                      placeholder="รหัสผ่านใหม่"
                      className="input-field"
                      style={{ fontSize: 14 }}
                    />
                  </div>
                  <div>
                    <label style={{ fontSize: 12, color: 'var(--text2)', display: 'block', marginBottom: 6, fontWeight: 500 }}>ยืนยันรหัสผ่านใหม่</label>
                    <input
                      type="password"
                      value={confirmNewPwd}
                      onChange={e => setConfirmNewPwd(e.target.value)}
                      placeholder="ยืนยันรหัสผ่านใหม่"
                      className="input-field"
                      style={{ fontSize: 14 }}
                    />
                  </div>
                  <div style={{ display: 'flex', gap: 8 }}>
                    <button
                      onClick={() => {
                        setShowPasswordForm(false);
                        setCurrentPwd('');
                        setNewPwd('');
                        setConfirmNewPwd('');
                        setPwdError('');
                      }}
                      className="btn btn-ghost"
                      style={{ flex: 1, padding: '10px', fontSize: 13 }}
                    >
                      ยกเลิก
                    </button>
                    <button
                      onClick={handleChangePassword}
                      className="btn btn-primary"
                      style={{ flex: 2, padding: '10px', fontSize: 13 }}
                      disabled={changingPwd}
                    >
                      {changingPwd ? 'กำลังเปลี่ยน...' : 'เปลี่ยนรหัสผ่าน'}
                    </button>
                  </div>
                </div>
              )}
            </div>
          )}

          {/* Preferences Card */}
          <div style={{ background: 'var(--surface)', border: '1px solid var(--surface-border)', borderRadius: 16, padding: 24, marginBottom: 24 }}>
            <h3 style={{ fontSize: 16, fontWeight: 600, color: '#fff', marginBottom: 20 }}>การตั้งค่าการใช้งาน</h3>

            <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
              <div>
                <label style={{ fontSize: 12, color: 'var(--text2)', display: 'block', marginBottom: 6, fontWeight: 500 }}>ค่าเริ่มต้น Gram Stain</label>
                <select
                  value={defaultGram}
                  onChange={e => setDefaultGram(e.target.value)}
                  className="input-field"
                  style={{ fontSize: 14, cursor: 'pointer' }}
                >
                  <option value="">-- เลือกค่าเริ่มต้น --</option>
                  <option value="gpc_cluster">GPC in clusters (Staphylococcus)</option>
                  <option value="gpc_chain">GPC in chains (Streptococcus)</option>
                  <option value="gpc_diplo">GP Diplococci</option>
                  <option value="gpb">GP Bacilli</option>
                  <option value="gnb_oxi_neg">GN Rods + Oxidase −</option>
                  <option value="gnb_oxi_pos_tcbs">GN Rods + Oxidase + + TCBS+</option>
                  <option value="gnb_oxi_pos_nfb">GN Rods + Oxidase + + TSI K/N</option>
                  <option value="gn_diplo">GN Diplococci/Coccobacilli</option>
                </select>
              </div>

              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '12px 16px', background: 'var(--bg)', borderRadius: 8, border: '1px solid var(--surface-border)' }}>
                <div>
                  <div style={{ fontSize: 14, fontWeight: 500, color: '#fff', marginBottom: 2 }}>บันทึกอัตโนมัติ (Auto-save)</div>
                  <div style={{ fontSize: 12, color: 'var(--text2)' }}>บันทึกข้อมูล case โดยอัตโนมัติเมื่อกดวิเคราะห์</div>
                </div>
                <button
                  onClick={() => setAutoSave(!autoSave)}
                  style={{
                    width: 48,
                    height: 26,
                    borderRadius: 13,
                    background: autoSave ? 'linear-gradient(135deg, #10b981, #059669)' : 'var(--surface-border)',
                    border: 'none',
                    cursor: 'pointer',
                    position: 'relative',
                    transition: 'all 0.2s'
                  }}
                >
                  <div style={{
                    width: 22,
                    height: 22,
                    borderRadius: '50%',
                    background: '#fff',
                    position: 'absolute',
                    top: 2,
                    left: autoSave ? 24 : 2,
                    transition: 'all 0.2s',
                    boxShadow: '0 2px 4px rgba(0,0,0,0.2)'
                  }} />
                </button>
              </div>
            </div>
          </div>

          {/* Action Buttons */}
          <div style={{ display: 'flex', gap: 12, marginTop: 24 }}>
            <button
              onClick={handleReset}
              className="btn btn-ghost"
              style={{ flex: 1, padding: '14px', fontSize: 14, fontWeight: 600 }}
            >
              รีเซ็ตค่าเริ่มต้น
            </button>
            <button
              onClick={handleSave}
              className="btn btn-primary"
              style={{ flex: 2, padding: '14px', fontSize: 14, fontWeight: 600 }}
              disabled={saving}
            >
              {saving ? 'กำลังบันทึก...' : '💾 บันทึกการตั้งค่า'}
            </button>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);


  </script>
</body>

</html>
