<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Microbial World — Premium Diagnostic Guide</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Firebase v9 Compat for simpler inclusion -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Prompt:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    :root {
      --bg: #030712;
      --bg2: #111827;
      --surface: #111827;
      --surface-border: #1f2937;
      --surface2: #1f2937;
      --text: #f9fafb;
      --text2: #9ca3af;
      --text3: #6b7280;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --accent-glow: rgba(59, 130, 246, 0.4);
      --cyan: #06b6d4;
      --green: #10b981;
      --red: #ef4444;
      --radius: 12px;
      --radius-lg: 16px;
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -2px rgba(0, 0, 0, 0.15);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', 'Prompt', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    button {
      cursor: pointer;
      font-family: inherit;
      border: none;
      outline: none;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    input, select, textarea {
      font-family: inherit;
      outline: none;
      transition: all 0.2s;
    }

    .input-wrapper {
      position: relative;
      width: 100%;
      box-sizing: border-box;
    }

    .input-field {
      width: 100%;
      padding: 14px 16px;
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--surface-border);
      color: var(--text);
      font-size: 14px;
      transition: all 0.2s ease;
      box-sizing: border-box;
    }
    
    .input-field::placeholder { color: var(--text3); }

    .input-field:focus {
      border-color: var(--accent);
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--surface-border);
      border-radius: var(--radius-lg);
      padding: 24px;
      box-shadow: var(--shadow-sm);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .card:hover {
      box-shadow: var(--shadow-md);
    }

    /* Modals */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      animation: fadeIn 0.3s ease-out forwards;
    }

    .modal-content {
      background: rgba(17, 24, 39, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 32px;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 40px 80px -15px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 255, 255, 0.05) inset;
      animation: modalSlideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      color: #fff;
    }

    @keyframes modalSlideUp {
      from { opacity: 0; transform: translateY(40px) scale(0.92); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Buttons */
    .btn {
      padding: 12px 20px;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      cursor: pointer;
      border: 1px solid transparent;
      outline: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      color: #ffffff;
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }

    .btn-primary:hover:not(:disabled) {
      background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(59, 130, 246, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.3);
    }
    
    .btn-primary:active:not(:disabled) {
      transform: translateY(1px);
      box-shadow: 0 2px 8px rgba(59, 130, 246, 0.3);
    }

    .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; filter: grayscale(50%); }

    .btn-ghost {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text);
      backdrop-filter: blur(4px);
    }

    .btn-ghost:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
      transform: translateY(-1px);
    }
    
    .btn-google {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--surface-border);
      font-weight: 500;
      transition: all 0.2s;
    }
    .btn-google:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: #4b5563;
    }

    /* Floating Particles */
    .particle { position:absolute; background:var(--accent-glow); border-radius:50%; filter:blur(8px); animation:floatAnim 20s infinite linear; opacity:0.6; pointer-events:none; }
    @keyframes floatAnim {
      0% { transform:translateY(0) translateX(0) rotate(0deg); }
      33% { transform:translateY(-100px) translateX(50px) rotate(120deg); }
      66% { transform:translateY(50px) translateX(-50px) rotate(240deg); }
      100% { transform:translateY(0) translateX(0) rotate(360deg); }
    }

    /* Results */
    .result-positive {
      color: var(--green);
      font-weight: 700
    }

    .result-negative {
      color: var(--red);
      font-weight: 700
    }

    /* ═══ PREMIUM UI OVERHAUL ═══ */

    /* Navigation */
    .nav-bar {
      display: flex;
      align-items: center;
      background: rgba(3, 7, 18, 0.8);
      backdrop-filter: blur(20px) saturate(1.8);
      -webkit-backdrop-filter: blur(20px) saturate(1.8);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      padding: 0 20px;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    .nav-bar .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-right: 28px;
      font-weight: 800;
      font-size: 16px;
      letter-spacing: -0.5px;
      color: #fff;
    }
    .nav-bar .brand .emoji { font-size: 22px; }
    .nav-tab {
      position: relative;
      padding: 16px 16px;
      font-size: 13px;
      font-weight: 500;
      color: #94a3b8;
      background: none;
      border: none;
      cursor: pointer;
      transition: color 0.2s;
      white-space: nowrap;
    }
    .nav-tab:hover { color: #e2e8f0; }
    .nav-tab.active-tab {
      color: #fff;
      font-weight: 600;
    }
    .nav-tab.active-tab::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 12px;
      right: 12px;
      height: 2px;
      background: linear-gradient(90deg, #3b82f6, #06b6d4);
      border-radius: 2px 2px 0 0;
    }
    .nav-user {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .nav-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #06b6d4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.3);
    }
    .nav-signout {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #f87171;
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .nav-signout:hover {
      background: rgba(239, 68, 68, 0.2);
    }

    /* Page Headers */
    .page-header {
      padding: 28px 24px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .page-header h2 {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #fff;
      margin-bottom: 4px;
    }
    .page-header p {
      font-size: 13px;
      color: #64748b;
    }

    /* Workflow Step Cards */
    .wf-test-card {
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 14px;
      padding: 16px 18px;
      transition: all 0.2s ease;
    }
    .wf-test-card:hover {
      border-color: rgba(99, 102, 241, 0.2);
      background: rgba(15, 23, 42, 0.8);
    }
    .wf-test-card.answered {
      border-color: rgba(99, 102, 241, 0.3);
      background: rgba(99, 102, 241, 0.04);
    }
    .wf-test-label {
      font-size: 13px;
      font-weight: 600;
      color: #e2e8f0;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .wf-test-label .idx {
      background: rgba(99, 102, 241, 0.2);
      color: #818cf8;
      font-size: 10px;
      font-weight: 700;
      width: 22px;
      height: 22px;
      border-radius: 6px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .extra-badge {
      background: rgba(251, 146, 60, 0.15);
      color: #fb923c;
      border: 1px solid rgba(251, 146, 60, 0.3);
      font-size: 9px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .wf-test-card.extra-card {
      border-color: rgba(251, 146, 60, 0.12);
      background: rgba(251, 146, 60, 0.03);
      opacity: 0.85;
    }
    .wf-test-card.extra-card:hover {
      border-color: rgba(251, 146, 60, 0.25);
      background: rgba(251, 146, 60, 0.06);
      opacity: 1;
    }
    .wf-opt-btn {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #94a3b8;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
      font-weight: 500;
    }
    .wf-opt-btn:hover {
      background: rgba(99, 102, 241, 0.1);
      border-color: rgba(99, 102, 241, 0.3);
      color: #c7d2fe;
    }
    .wf-opt-btn.selected {
      background: rgba(99, 102, 241, 0.18);
      border-color: #6366f1;
      color: #a5b4fc;
      font-weight: 600;
      box-shadow: 0 0 12px rgba(99, 102, 241, 0.15);
    }
    .wf-opt-btn.skip {
      background: rgba(255, 255, 255, 0.02);
      border-style: dashed;
      border-color: rgba(255, 255, 255, 0.1);
      color: #475569;
      font-size: 11px;
    }
    .wf-opt-btn.skip:hover, .wf-opt-btn.skip.selected {
      background: rgba(100, 116, 139, 0.1);
      border-color: #475569;
      color: #64748b;
    }

    /* Progress Stepper */
    .progress-bar {
      background: rgba(3, 7, 18, 0.7);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 14px 24px;
    }
    .step-indicator {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      transition: all 0.3s;
    }
    .step-indicator.done {
      background: linear-gradient(135deg, #6366f1, #818cf8);
      color: #fff;
      box-shadow: 0 0 16px rgba(99, 102, 241, 0.3);
    }
    .step-indicator.pending {
      background: rgba(30, 41, 59, 0.8);
      color: #475569;
      border: 2px solid #1e293b;
    }

    /* Action buttons */
    .btn-action {
      padding: 13px 24px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.25, 0.8, 0.25, 1);
      border: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-action.primary {
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: #fff;
      box-shadow: 0 4px 14px rgba(99, 102, 241, 0.35);
    }
    .btn-action.primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(99, 102, 241, 0.5);
    }
    .btn-action.secondary {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #94a3b8;
    }
    .btn-action.secondary:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #e2e8f0;
    }
    .btn-action.save {
      background: linear-gradient(135deg, #06b6d4, #0891b2);
      color: #fff;
      box-shadow: 0 4px 14px rgba(6, 182, 212, 0.35);
    }
    .btn-action.save:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(6, 182, 212, 0.5);
    }

    /* Result Cards */
    .result-card {
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      padding: 18px;
      transition: all 0.25s;
    }
    .result-card:hover {
      border-color: rgba(255, 255, 255, 0.1);
      transform: translateY(-2px);
    }
    .result-card.top {
      background: rgba(99, 102, 241, 0.06);
      border-color: rgba(99, 102, 241, 0.2);
      box-shadow: 0 8px 32px rgba(99, 102, 241, 0.1);
    }

    /* Fade animation */
    .fade-in {
      animation: fadeSlideIn 0.35s ease-out forwards;
    }
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes mobileSheetIn {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

    /* Gram select cards */
    .gram-card {
      text-align: left;
      background: rgba(15, 23, 42, 0.6);
      border: 2px solid rgba(255, 255, 255, 0.06);
      color: #94a3b8;
      border-radius: 14px;
      padding: 16px 20px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .gram-card:hover {
      border-color: rgba(255,255,255,0.12);
      background: rgba(15, 23, 42, 0.8);
    }
    .gram-card.selected {
      font-weight: 700;
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.1);
    }
    .gram-indicator {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
    }
    .gram-card.selected .gram-indicator {
      border-width: 0;
    }

    /* 📱 Responsive Design / Mobile Optimization */
    @media (max-width: 768px) {
      .nav-bar {
        flex-wrap: wrap;
        height: auto;
        padding: 12px 16px 0;
        justify-content: space-between;
      }
      .nav-bar .brand {
        margin-bottom: 8px;
        width: auto;
        flex: 1;
        justify-content: flex-start;
      }
      .nav-user {
        margin-bottom: 8px;
        width: auto;
        flex: 0 0 auto;
        justify-content: flex-end;
      }
      .nav-bar nav {
        width: calc(100% + 32px);
        margin: 0 -16px;
        padding: 0 16px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        overflow-x: auto;
        justify-content: space-between;
        -webkit-overflow-scrolling: touch;
        order: 3;
      }
      .nav-bar nav::-webkit-scrollbar {
        display: none;
      }
      .nav-tab {
        flex: 1;
        text-align: center;
        padding: 14px 4px;
        font-size: 12px;
        white-space: nowrap;
      }

      /* Base Layout Adjustment */
      .layout-split {
        flex-direction: column !important;
        height: auto !important;
        min-height: calc(100vh - 140px);
        overflow-y: auto !important;
      }
      .layout-sidebar {
        width: 100% !important;
        max-height: 280px;
        border-right: none !important;
        border-bottom: 1px solid var(--surface-border) !important;
        flex-shrink: 0;
      }
      .layout-main {
        padding: 16px !important;
        flex: none !important;
        height: auto !important;
        overflow-y: visible !important;
      }

      .cases-container {
        padding: 20px 16px !important;
      }
      .cases-grid {
        grid-template-columns: 1fr !important;
        gap: 16px !important;
      }

      /* Result Cards Responsive */
      .result-card {
        padding: 14px;
      }
      .result-card > div:first-child {
        flex-wrap: wrap;
      }
      .result-card > div:first-child > div:last-child {
        text-align: left;
        margin-top: 4px;
        width: 100%;
      }
    }
  </style>
</head>

    // ══════════════════════════════════════
    // LANDING PAGE COMPONENT
    // ══════════════════════════════════════
    function LandingPage({ loginWithGoogle, onGuest }) {
      const [mode, setMode] = useState('login');
      const [name, setName] = useState('');
      const [email, setEmail] = useState('');
      const [pwd, setPwd] = useState('');
      const [pwd2, setPwd2] = useState('');
      const [loading, setLoading] = useState(false);
      const [showPwd, setShowPwd] = useState(false);

      const togglePwd = () => setShowPwd(!showPwd);

      const [authErr, setAuthErr] = useState('');
      const [showForgotPwd, setShowForgotPwd] = useState(false);
      const [resetEmail, setResetEmail] = useState('');
      const [resetLoading, setResetLoading] = useState(false);
      const [resetMsg, setResetMsg] = useState('');

      const handleEmailAuth = async (e) => {
        e.preventDefault();
        setAuthErr('');
        if (!isFirebaseActive) return setAuthErr('กรุณาตั้งค่า Firebase Config ในโค้ดก่อนใช้งานครับ');
        
        if (mode === 'signup') {
          if (pwd !== pwd2) return setAuthErr('รหัสผ่านและการยืนยันรหัสผ่านไม่ตรงกัน');
          if (!name.trim()) return setAuthErr('กรุณากรอกชื่อผู้ใช้งานครับ');
        }

        setLoading(true);
        try {
          if (mode === 'login') {
            await auth.signInWithEmailAndPassword(email, pwd);
          } else {
            const cred = await auth.createUserWithEmailAndPassword(email, pwd);
            await cred.user.updateProfile({ displayName: name.trim() });
            // FORCE reload user to reflect profile update immediately
            await auth.currentUser.reload();
          }
        } catch (err) {
          console.error(err);
          let msg = err.message; 
          
          if (msg.includes('email-already-in-use')) msg = 'อีเมลนี้มีผู้ใช้งานแล้วในระบบ';
          else if (msg.includes('weak-password')) msg = 'รหัสผ่านอ่อนเกินไป (บังคับ 6 ตัวอักษรขึ้นไป)';
          else if (msg.includes('invalid-email')) msg = 'รูปแบบอีเมลและโดเมนไม่ถูกต้อง';
          else if (msg.includes('operation-not-allowed')) msg = 'บอทถูกระงับ! ล็อกอินผ่านอีเมลยังไม่ถูกเปิดใช้งาน (เข้าไปเปิด Service Authentication ใน Firebase ก่อนครับ)';
          else if (msg.includes('user-not-found') || msg.includes('wrong-password') || msg.includes('invalid-credential')) msg = 'อีเมลหรือรหัสผ่านไม่ถูกต้อง';
          else if (msg.includes('api-key-not-valid')) msg = 'API Key ของ Firebase ที่ใส่ในโค้ดขัดข้อง หรือ Google กำลังประมวลผลระบบอยู่ (หากเพิ่งสร้างโปรเจกต์ให้รอประมาณ 5 นาที แล้วรีเฟรช)';
          
          setAuthErr(msg);
        }
        setLoading(false);
      };

      const handleForgotPassword = async (e) => {
        e.preventDefault();
        setResetMsg('');
        if (!resetEmail || !resetEmail.trim()) return setResetMsg('กรุณากรอกอีเมลของคุณ');
        if (!isFirebaseActive) return setResetMsg('กรุณาตั้งค่า Firebase Config ในโค้ดก่อนใช้งานครับ');

        setResetLoading(true);
        try {
          console.log('Sending password reset email to:', resetEmail.trim());
          await auth.sendPasswordResetEmail(resetEmail.trim(), {
            url: window.location.href
          });
          console.log('Password reset email sent successfully');
          setResetMsg('✅ ส่งอีเมลรีเซ็ตรหัสผ่านเรียบร้อยแล้ว กรุณาตรวจสอบอีเมลของคุณ (อาจอยู่ใน Spam/Junk folder)');
        } catch (error) {
          console.error('Password reset error:', error);
          console.error('Error code:', error.code);
          console.error('Error message:', error.message);
          
          if (error.code === 'auth/user-not-found') {
            setResetMsg('ไม่พบอีเมลนี้ในระบบ');
          } else if (error.code === 'auth/invalid-email') {
            setResetMsg('รูปแบบอีเมลไม่ถูกต้อง');
          } else if (error.code === 'auth/operation-not-allowed') {
            setResetMsg('❌ ระบบส่งอีเมลรีเซ็ตรหัสผ่านยังไม่ถูกเปิดใช้งาน\nกรุณาไปที่ Firebase Console → Authentication → Sign-in method → เปิด Email/Password และตรวจสอบ Email templates');
          } else if (error.code === 'auth/too-many-requests') {
            setResetMsg('ส่งคำขอรีเซ็ตรหัสผ่านถี่เกินไป กรุณารอสักครู่แล้วลองใหม่');
          } else {
            setResetMsg('เกิดข้อผิดพลาด: ' + error.message + '\n(Error Code: ' + error.code + ')');
          }
        }
        setResetLoading(false);
      };

      const eyeIcon = (
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          {showPwd ? (
            <><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></>
          ) : (
            <><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></>
          )}
        </svg>
      );

      return (
        <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', position: 'relative', overflow: 'hidden', background: '#030712' }}>
          <div className="particle" style={{width:400,height:400,top:'-15%',left:'-15%',background:'rgba(59, 130, 246, 0.15)',animationDuration:'25s'}} />
          <div className="particle" style={{width:300,height:300,bottom:'-10%',right:'-10%',background:'rgba(6,182,212,0.15)',animationDuration:'20s'}} />
          
          <div className="card fade-in" style={{ width: '100%', maxWidth: 420, padding: '48px 40px', zIndex: 10, background: 'rgba(17, 24, 39, 0.6)', backdropFilter: 'blur(32px)', border: '1px solid rgba(255,255,255,0.08)', boxShadow: '0 0 0 1px rgba(0,0,0,0.5), 0 30px 60px -12px rgba(0,0,0,0.9)' }}>
            <div style={{ textAlign: 'center', marginBottom: 32 }}>
              <div style={{ fontSize: 44, marginBottom: 16 }}>🦠</div>
              <h1 style={{ fontSize: 24, fontWeight: 700, color: '#fff', letterSpacing: '-0.5px' }}>
                Microbial World
              </h1>
              <p style={{ color: 'var(--text2)', fontSize: 14, marginTop: 8 }}>ยินดีต้อนรับเข้าสู่ระบบวินิจฉัย</p>
            </div>

            <form onSubmit={handleEmailAuth} style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
              {authErr && (
                <div style={{ background: 'rgba(239,68,68,0.1)', border: '1px solid rgba(239,68,68,0.3)', padding: '12px 16px', borderRadius: 8, color: '#fca5a5', fontSize: 13, display: 'flex', alignItems: 'center', gap: 8 }}>
                  <span>⚠️</span> {authErr}
                </div>
              )}
              {mode === 'signup' && (
                <div className="input-wrapper">
                  <input 
                    type="text" required placeholder="ชื่อที่ต้องการให้แสดง (Display Name)" 
                    value={name} onChange={e=>setName(e.target.value)}
                    className="input-field"
                  />
                </div>
              )}
              
              <div className="input-wrapper">
                <input 
                  type="email" required placeholder="อีเมล (Email)" 
                  value={email} onChange={e=>setEmail(e.target.value)}
                  className="input-field"
                />
              </div>
              
              <div className="input-wrapper">
                <input 
                  type={showPwd ? "text" : "password"} required placeholder="รหัสผ่าน (6 ตัวอักษรขึ้นไป)" 
                  value={pwd} onChange={e=>setPwd(e.target.value)} minLength="6"
                  className="input-field" style={{ paddingRight: 45 }}
                />
                <button type="button" onClick={togglePwd} style={{ position: 'absolute', right: 12, top: 14, background: 'none', border: 'none', color: 'var(--text3)', cursor: 'pointer', display: 'flex' }}>
                  {eyeIcon}
                </button>
              </div>
              
              {mode === 'signup' && (
                <div className="input-wrapper">
                  <input 
                    type={showPwd ? "text" : "password"} required placeholder="ยืนยันรหัสผ่าน (Confirm Password)" 
                    value={pwd2} onChange={e=>setPwd2(e.target.value)} minLength="6"
                    className="input-field" style={{ paddingRight: 45 }}
                  />
                </div>
              )}
              
              <button type="submit" className="btn btn-primary" style={{ padding: '14px', fontSize: 15, marginTop: 8, width: '100%' }} disabled={loading}>
                {loading ? 'Processing...' : (mode === 'login' ? 'เข้าสู่ระบบ' : 'ตั้งค่าบัญชีของคุณ')}
              </button>
            </form>

            {mode === 'login' && !showForgotPwd && (
              <button
                onClick={() => { setShowForgotPwd(true); setResetEmail(email); }}
                style={{ background: 'none', border: 'none', color: 'var(--accent)', fontSize: 13, cursor: 'pointer', marginTop: 8, textDecoration: 'underline' }}
              >
                ลืมรหัสผ่าน?
              </button>
            )}

            {showForgotPwd && (
              <div style={{ marginTop: 24, padding: 20, background: 'var(--bg)', borderRadius: 12, border: '1px solid var(--surface-border)' }}>
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
                  <h3 style={{ fontSize: 16, fontWeight: 600, color: '#fff' }}>รีเซ็ตรหัสผ่าน</h3>
                  <button
                    onClick={() => { setShowForgotPwd(false); setResetEmail(''); setResetMsg(''); }}
                    style={{ background: 'none', border: 'none', color: 'var(--text3)', cursor: 'pointer', fontSize: 20 }}
                  >
                    ✕
                  </button>
                </div>
                <form onSubmit={handleForgotPassword} style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                  {resetMsg && (
                    <div style={{ background: resetMsg.includes('✅') ? 'rgba(16, 185, 129, 0.1)' : 'rgba(239, 68, 68, 0.1)', border: resetMsg.includes('✅') ? '1px solid rgba(16, 185, 129, 0.3)' : '1px solid rgba(239, 68, 68, 0.3)', padding: '10px 14px', borderRadius: 8, color: resetMsg.includes('✅') ? '#10b981' : '#fca5a5', fontSize: 12 }}>
                      {resetMsg}
                    </div>
                  )}
                  <div className="input-wrapper">
                    <input
                      type="email"
                      required
                      placeholder="อีเมลสำหรับรีเซ็ตรหัสผ่าน"
                      value={resetEmail}
                      onChange={e => setResetEmail(e.target.value)}
                      className="input-field"
                    />
                  </div>
                  <button type="submit" className="btn btn-primary" style={{ padding: '12px', fontSize: 14 }} disabled={resetLoading}>
                    {resetLoading ? 'กำลังส่ง...' : 'ส่งอีเมลรีเซ็ตรหัสผ่าน'}
                  </button>
                </form>
              </div>
            )}

            <div style={{ textAlign: 'center', marginTop: 24, fontSize: 14 }}>
              <span style={{ color: 'var(--text3)' }}>
                {mode === 'login' ? 'ยังไม่ได้เปิดบัญชี?' : 'มีบัญชีอยู่แล้ว?'}
              </span>
              <button onClick={() => {
                setMode(mode === 'login' ? 'signup' : 'login');
                setPwd(''); setPwd2(''); setEmail('');
                setShowForgotPwd(false);
              }} style={{ background: 'none', border: 'none', color: '#fff', fontWeight: 600, marginLeft: 6, cursor: 'pointer' }}>
                {mode === 'login' ? 'สร้างบัญชีใหม่' : 'เข้าสู่ระบบ'}
              </button>
            </div>

            <div style={{ display: 'flex', alignItems: 'center', margin: '32px 0' }}>
              <div style={{ flex: 1, height: 1, background: 'var(--surface-border)' }}></div>
              <span style={{ margin: '0 16px', color: 'var(--text3)', fontSize: 12, textTransform: 'uppercase', letterSpacing: 1 }}>หรือ</span>
              <div style={{ flex: 1, height: 1, background: 'var(--surface-border)' }}></div>
            </div>

            <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              <button onClick={loginWithGoogle} className="btn btn-google" style={{ width: '100%', padding: '10px' }}>
                <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                  <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                  <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                  <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                  <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Continue with Google
              </button>
              
              <button onClick={onGuest} className="btn btn-ghost" style={{ width: '100%', padding: '10px' }}>
                ใช้งานโดยไม่ล็อคอิน (Guest Mode)
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ══════════════════════════════════════
    // APP SHELL
    // ══════════════════════════════════════
    function App() {
      const [page, setPage] = useState('specimen');
      const [wfData, setWfData] = useState(null);
      const [user, setUser] = useState(null);
      const [isGuest, setIsGuest] = useState(false);
      const [loadingAuth, setLoadingAuth] = useState(true);
      const [settings, setSettings] = useState(() => JSON.parse(localStorage.getItem('mbsettings') || '{}'));

      // Global custom prompt state
      const [promptState, setPromptState] = useState({ isOpen: false, title: '', value: '', onConfirm: null });
      const [alertState, setAlertState] = useState({ isOpen: false, title: '', text: '' });

      useEffect(() => {
        if (isFirebaseActive) {
          const unsubscribe = auth.onAuthStateChanged(usr => {
            setUser(usr);
            setLoadingAuth(false);
            if (usr) {
              db.collection('users').doc(usr.uid).collection('settings').doc('preferences').get()
                .then(doc => {
                  if (doc.exists) {
                    const cloudSettings = doc.data();
                    setSettings(cloudSettings);
                    localStorage.setItem('mbsettings', JSON.stringify(cloudSettings));
                  }
                })
                .catch(e => console.error('Error loading settings:', e));
            }
          });
          return unsubscribe;
        } else {
          setLoadingAuth(false);
        }
      }, []);

      const saveSettings = async (newSettings) => {
        setSettings(newSettings);
        localStorage.setItem('mbsettings', JSON.stringify(newSettings));
        if (isFirebaseActive && user) {
          try {
            await db.collection('users').doc(user.uid).collection('settings').doc('preferences').set(newSettings);
          } catch (e) {
            console.error('Error saving settings to Firebase:', e);
          }
        }
      };

      const loginWithGoogle = async () => {
        if (!isFirebaseActive) return alert('กรุณาใส่ Firebase Config ก่อนครับ (ดูในโค้ดบรรทัดที่ 60)');
        const provider = new firebase.auth.GoogleAuthProvider();
        try {
          await auth.signInWithPopup(provider);
        } catch (e) {
          console.error('Login error', e);
          if (e.code === 'auth/operation-not-supported-in-this-environment') {
            alert('❌ การล็อกอินด้วย Google จำเป็นต้องเปิดผ่านเว็บเซิร์ฟเวอร์ (http/https)\nระบบไม่รองรับการเปิดเปิดไฟล์โดยตรงแบบนี้ (file://)\n\n👉 แนะนำให้ใช้วิธี "สมัครสมาชิกด้วยอีเมล" แทนครับ (หรือรันผ่าน Live Server ก็ได้ครับ)');
          } else {
            alert('การล็อกอินล้มเหลว: ' + e.message);
          }
        }
      };

      const logout = () => { if (isFirebaseActive) { auth.signOut(); setIsGuest(false); } };

      const showPrompt = (title, defaultValue, onConfirm) => {
        setPromptState({ isOpen: true, title, value: defaultValue, onConfirm });
      };

      const closePrompt = () => setPromptState({ isOpen: false, title: '', value: '', onConfirm: null });

      const showAlert = (title, text) => {
        setAlertState({ isOpen: true, title, text });
      };
      
      const closeAlert = () => setAlertState({ isOpen: false, title: '', text: '' });

      if (loadingAuth) {
        return <div style={{ height:'100vh', display:'flex', alignItems:'center', justifyContent:'center' }}>กำลังตรวจสอบระบบ...</div>;
      }

      if (!user && !isGuest) {
        return <LandingPage loginWithGoogle={loginWithGoogle} onGuest={() => setIsGuest(true)} auth={auth} isFirebaseActive={isFirebaseActive} />;
      }

      return (
        <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>
          <Header page={page} setPage={setPage} user={user} loginWithGoogle={loginWithGoogle} logout={logout} exitGuest={() => setIsGuest(false)} />
          <main style={{ flex: 1, overflow: 'hidden' }}>
            {page === 'specimen' && <SpecimenPage setPage={setPage} />}
            {page === 'workflow' && <WorkflowPage initData={wfData} setWfData={setWfData} showPrompt={showPrompt} showAlert={showAlert} user={user} isGuest={isGuest} />}

    };

    function isTestMatchByAlias(rowName, suiteTest) {
      const rn = normalizeKey(rowName);
      const sn = normalizeKey(suiteTest.label);
      if (!rn || !sn) return false;
      if (rn === sn || rn.includes(sn) || sn.includes(rn)) return true;
      const aliases = TEST_ALIASES[suiteTest.id] || [];
      return aliases.some(a => {
        const an = normalizeKey(a);
        return an && (rn === an || rn.includes(an) || an.includes(rn));
      });
    }

    function getCanonicalBiochemRows(bug) {
      if (!bug) return [];
      const suite = SUITES[bug.group];
      const rows = bug.biochem || [];
      if (!suite?.tests?.length) return rows;

      const used = new Set();
      const canonical = suite.tests.map(st => {
        const idx = rows.findIndex((r, i) => !used.has(i) && isTestMatchByAlias(r.t, st));
        if (idx >= 0) {
          used.add(idx);
          return { ...rows[idx], t: st.label };
        }
        return { t: st.label, r: '—', n: 'N/A' };
      });
      const extras = rows.filter((_, i) => !used.has(i));
      return [...canonical, ...extras];
    }

    function normalizeBiochemNamesForBug(bug) {
      if (!bug) return bug;
      const suite = SUITES[bug.group];
      if (!suite?.tests?.length) return bug;
      const rows = bug.biochem || [];
      const seenSuiteTestIds = new Set();
      const normalizedRows = rows.map(row => {
        const matched = suite.tests.find(st => isTestMatchByAlias(row.t, st));
        if (!matched) return row;
        if (seenSuiteTestIds.has(matched.id)) {
          const prevNote = row.n ? `${row.n}; ` : '';
          return { ...row, t: matched.label, n: `${prevNote}Extra duplicate entry` };
        }
        seenSuiteTestIds.add(matched.id);
        return { ...row, t: matched.label };
      });
      return { ...bug, biochem: normalizedRows };
    }

    const LIBRARY_CLEAN = LIBRARY_ALL.map(normalizeBiochemNamesForBug);

    // ══════════════════════════════════════
    // PROBABILITY ENGINE
    // ══════════════════════════════════════
    // HARD EXCLUSION: if mismatch → organism is virtually eliminated
    const HARD_EXCLUSION_TESTS = ['hemolysis', 'coagulase', 'oxidase', 'catalase'];
    // KEY DISCRIMINATING TESTS - mismatch gives heavy penalty
    const KEY_TESTS = ['bacitracin', 'ppr', 'camp', 'optochin', 'bile solubility', 'bile esculin', '6.5% nacl', '6.5 nacl', 'coagulase', 'oxidase', 'catalase', 'hemolysis', 'hippurate', 'novobiocin', 'dnase', 'maltose', 'n2 gas', 'esculin', 'arabinose', 'king p', 'king f', 'mannitol', 'lactose', 'sucrose', 'gelatin', 'starch', 'indole', 'motile', 'motility', 'growth 42', 'growth42', 'sorbitol', 'xylose', 'lysine', 'ornithine', 'ldc', 'odc', 'h2s', 'urease', 'vp', 'citrate', 'string test'];

    function normalizeSR(val) {
      // Extract only the first letter S or R for sensitive/resistant tests
      const v = String(val).toLowerCase().trim();
      if (v.startsWith('s')) return 's';
      if (v.startsWith('r')) return 'r';
      return v;
    }

    function isSRTest(testName) {
      const n = testName.toLowerCase();
      return n.includes('bacitracin') || n.includes('optochin') || n.includes('novobiocin');
    }

    function testMatch(dbResult, userAnswer) {
      const normR = dbResult.replace(/−/g, '-').toLowerCase().trim();
      const normAns = String(userAnswer).replace(/−/g, '-').toLowerCase().trim();

      if (normR === normAns) return true;

      const isV = normR === 'v' || normR.includes('+/-') || normR.includes('-/+') || normR.includes('v)') || normR === 'γ/α' || normR === 'α/γ';
      if (isV) return null; // variable - partial match

      // For +/- tests: exact symbol match only
      const rSign = normR.replace(/[^+\-]/g, '').charAt(0);
      const aSign = normAns.replace(/[^+\-]/g, '').charAt(0);
      if (rSign && aSign && rSign !== '/' && aSign !== '/') {
        return rSign === aSign;
      }

      // For S/R (sensitive/resistant) tests: first letter only
      const rSR = normalizeSR(normR);
      const aSR = normalizeSR(normAns);
      if ((rSR === 's' || rSR === 'r') && (aSR === 's' || aSR === 'r')) {
        return rSR === aSR;
      }

      // Hemolysis: α β γ matching - handle UI format 'β (complete)', 'α (partial/green)', 'γ (none)'
      const hemTypes = ['β', 'α', 'γ', 'beta', 'alpha', 'gamma'];
      const rHasHem = hemTypes.some(h => normR.includes(h));
      const aHasHem = hemTypes.some(h => normAns.includes(h));
      if (rHasHem || aHasHem) {
        const toHem = v => {
          if (v.includes('β') || v.includes('beta') || v.includes('complete')) return 'β';
          if (v.includes('α') || v.includes('alpha') || v.includes('partial') || v.includes('green')) return 'α';
          if (v.includes('γ') || v.includes('gamma') || v.includes('none')) return 'γ';
          return v;
        };
        const rHem = toHem(normR);
        const aHem = toHem(normAns);
        if ((rHem === 'β' || rHem === 'α' || rHem === 'γ') && (aHem === 'β' || aHem === 'α' || aHem === 'γ')) {
          return rHem === aHem;
        }
        // partial match for variable hemolysis like 'γ/α'
        if (normR.includes('/')) return normR.includes(aHem);
      }

      return false;
    }

    // Extract key tests from biochem notes: tests marked with n: 'KEY...'
    function getKeyTestsForBug(bug) {
      const rows = getCanonicalBiochemRows(bug);
      return rows.filter(row => row.n && row.n.toUpperCase().startsWith('KEY'));
    }

    function calcProbability(group, answers) {
      const candidates = LIBRARY_CLEAN.filter(b => b.group === group);
      const answerEntries = Object.entries(answers).filter(([, v]) => v);

      return candidates.map(bug => {
        const tests = getCanonicalBiochemRows(bug);
        const keyTestsForBug = getKeyTestsForBug(bug);
        let score = 0, total = 0;
        let keyMatchCount = 0, keyMismatchCount = 0, keyTestedCount = 0;
        let hardExcluded = false; // organism is virtually eliminated

        answerEntries.forEach(([ansKey, ans]) => {
          const cleanAnsKey = ansKey.replace(/[^a-z0-9]/g, '');
          // Resolve aliases: e.g. sorbitol_ent → ['sorbitol'] → 'sorbitol'
          const aliasTargets = (TEST_ALIASES[ansKey] || []).map(a => a.toLowerCase().replace(/[^a-z0-9]/g, ''));

          const testDef = tests.find(b => {
            const bk = b.t.toLowerCase().replace(/[^a-z0-9]/g, '');
            if (bk === cleanAnsKey || cleanAnsKey.includes(bk) || bk.includes(cleanAnsKey)) return true;
            // Also check via alias targets
            return aliasTargets.some(at => bk === at || at.includes(bk) || bk.includes(at));
          });

          // Check if this is a HARD EXCLUSION test (hemolysis, coagulase, oxidase, catalase)
          const isHardExclusion = HARD_EXCLUSION_TESTS.some(k => {
            const kk = k.replace(/[^a-z0-9]/g, '');
            return cleanAnsKey === kk || cleanAnsKey.includes(kk) || kk.includes(cleanAnsKey);
          });

          // Check if this answered test is a KEY test for this bug (from n: 'KEY...' in biochem)
          const isKeyForThisBug = keyTestsForBug.some(kt => {
            const kk = kt.t.toLowerCase().replace(/[^a-z0-9]/g, '');
            return kk === cleanAnsKey || cleanAnsKey.includes(kk) || kk.includes(cleanAnsKey);
          });

          // Also check global key tests list
          const isGlobalKey = KEY_TESTS.some(k => {
            const kk = k.replace(/[^a-z0-9]/g, '');
            return cleanAnsKey.includes(kk) || kk.includes(cleanAnsKey);
          });

          const weight = isHardExclusion ? 15 : isKeyForThisBug ? 8 : isGlobalKey ? 5 : 3;

          if (!testDef) {
            total += weight;
            if (String(ans).includes('-') || String(ans).includes('−')) {
              score += 1;
            }
            return;
          }

          total += weight;
          const { r } = testDef;
          const isV = r.replace(/−/g, '-').toLowerCase() === 'v' || r.includes('+/-') || r.includes('-/+');
          const matchResult = testMatch(r, ans);

          if (isKeyForThisBug || isGlobalKey) keyTestedCount++;

          if (matchResult === true) {
            score += weight;
            if (isKeyForThisBug || isGlobalKey) keyMatchCount++;
          } else if (matchResult === null || isV) {
            score += Math.floor(weight / 3);
          } else {
            // MISMATCH
            if (isHardExclusion) {
              // Hard exclusion mismatch: organism is eliminated
              score -= weight * 3;
              hardExcluded = true;
            } else if (isKeyForThisBug) {
              score -= weight * 2;
              keyMismatchCount++;
            } else if (isGlobalKey) {
              score -= weight;
              keyMismatchCount++;
            }
            // else: normal test mismatch = 0 points only
          }
        });

        // Confident ID bonus: all key tests matched and no hard exclusion
        const bugKeyTestedAll = !hardExcluded &&
          keyTestsForBug.length > 0 &&
          keyTestedCount >= Math.min(keyTestsForBug.length, answerEntries.length) &&
          keyMismatchCount === 0 &&
          keyMatchCount >= Math.min(2, keyTestsForBug.length);

        let rawPct = total > 0 ? (score / total) * 100 : 0;
        if (bugKeyTestedAll) rawPct = Math.max(rawPct, 85);
        if (hardExcluded) rawPct = Math.min(rawPct, 5); // hard cap at 5% if excluded

        const pct = Math.min(99, Math.max(0, Math.round(rawPct)));
        return { ...bug, pct, _keyMatch: keyMatchCount, _keyMismatch: keyMismatchCount, _excluded: hardExcluded };
      }).sort((a, b) => b.pct - a.pct);
    }

    // Calculate test importance score based on discriminating power
    function calcTestImportance(group, currentAnswers) {
      const candidates = LIBRARY_CLEAN.filter(b => b.group === group);
      if (candidates.length === 0) return [];
      
      // Get all test IDs from the suite
      const suiteTests = SUITES[group]?.tests || [];
      
      return suiteTests.map(test => {
        const testId = test.id;
        
        // Skip if already answered
        if (currentAnswers[testId]) {
          return { test, importance: 0, answered: true };
        }
        
        // Calculate how well this test discriminates current candidates
        const optionGroups = {};
        
        test.options.forEach(opt => {
          optionGroups[opt] = [];
        });
        
        // Group organisms by their expected result for this test
        candidates.forEach(bug => {
          const testRow = bug.biochem?.find(b => {
            const bk = b.t.toLowerCase().replace(/[^a-z0-9]/g, '');
            const tk = test.label.toLowerCase().replace(/[^a-z0-9]/g, '');
            return bk === tk || bk.includes(tk) || tk.includes(bk);
          });
          
          if (testRow) {
            const expected = testRow.r;
            // Find matching option
            test.options.forEach(opt => {
              if (testMatch(expected, opt)) {
                optionGroups[opt].push(bug);
              }
            });
          }
        });
        
        // Calculate discrimination power (entropy reduction)
        const totalOrgs = candidates.length;
        let maxGroupSize = 0;
        let nonEmptyGroups = 0;
        
        Object.values(optionGroups).forEach(group => {
          if (group.length > 0) {
            nonEmptyGroups++;
            maxGroupSize = Math.max(maxGroupSize, group.length);
          }
        });
        
        // Importance = how evenly distributed organisms are across options
        // High importance = splits organisms evenly (discriminates well)
        // Low importance = all organisms give same result
        let importance = 0;
        if (nonEmptyGroups > 1) {
          // Calculate entropy
          let entropy = 0;
          Object.values(optionGroups).forEach(group => {
            if (group.length > 0) {
              const p = group.length / totalOrgs;
              entropy -= p * Math.log2(p);
            }
          });
          // Normalize to 0-100
          const maxEntropy = Math.log2(nonEmptyGroups);
          importance = Math.round((entropy / maxEntropy) * 100);
        }
        
        // Boost importance for key tests
        const isKeyTest = KEY_TESTS.some(k => {
          const kk = k.toLowerCase().replace(/[^a-z0-9]/g, '');
          const tk = test.label.toLowerCase().replace(/[^a-z0-9]/g, '');
          return kk === tk || kk.includes(tk) || tk.includes(kk);
        });
        
        if (isKeyTest) importance = Math.min(100, importance + 15);
        
        return { test, importance, answered: false, optionGroups };
      }).sort((a, b) => b.importance - a.importance);
    }

        return mg && mq;
      }).sort((a, b) => a.name.localeCompare(b.name)), [grp, q]);

      const selBug = LIBRARY_CLEAN.find(b => b.id === sel);

      const selGrp = GROUPS.find(g => g.id === (selBug?.group || 'all'));
      const canonicalBiochem = useMemo(() => getCanonicalBiochemRows(selBug), [selBug]);

      return (
        <div style={{ display: 'flex', flexDirection: 'column', height: isMobile ? 'auto' : 'calc(100vh - 56px)', minHeight: isMobile ? 'calc(100vh - 120px)' : undefined }}>
          {/* Toolbar */}
          <div style={{ background: '#0d1526', borderBottom: '1px solid #1e3055', padding: '10px 16px', display: 'flex', gap: 8, flexWrap: 'wrap', alignItems: 'center', flexShrink: 0 }}>
            <div style={{ position: 'relative', flex: '0 0 200px' }}>
              <span style={{ position: 'absolute', left: 8, top: '50%', transform: 'translateY(-50%)', color: '#64748b', fontSize: 13 }}>🔍</span>
              <input value={q} onChange={e => setQ(e.target.value)} placeholder="ค้นหาเชื้อ..." style={{ width: '100%', background: '#132040', border: '1px solid #1e3055', borderRadius: 8, padding: '7px 10px 7px 28px', color: '#e2e8f0', fontSize: 12 }} />
            </div>
            {GROUPS.map(g => (
              <button key={g.id} onClick={() => setGrp(g.id)} style={{
                background: grp === g.id ? `${g.color}20` : 'transparent',
                border: `1px solid ${grp === g.id ? g.color : '#1e3055'}`,
                color: grp === g.id ? g.color : '#64748b',
                borderRadius: 20, padding: '4px 11px', fontSize: 11, fontWeight: 600, cursor: 'pointer', transition: 'all .15s'
              }}>{g.emoji} {g.label}</button>
            ))}
            <span style={{ marginLeft: 'auto', fontSize: 11, color: '#64748b' }}>{filtered.length} organisms</span>
          </div>
          {/* Body */}
          <div style={{ display: 'flex', flexDirection: isMobile ? 'column' : 'row', flex: 1, overflow: isMobile ? 'visible' : 'hidden', minHeight: 0 }}>
            {/* List */}
            <div style={{ width: isMobile ? '100%' : (sel ? '35%' : '100%'), maxHeight: isMobile && selBug ? '40vh' : 'none', overflowY: 'auto', padding: '8px 12px', transition: 'width .2s', borderRight: !isMobile && sel ? '1px solid #1e3055' : 'none', borderBottom: isMobile && selBug ? '1px solid #1e3055' : 'none' }}>
              {filtered.map(b => {
                const g = GROUPS.find(x => x.id === b.group);
                const isSel = sel === b.id;
                return (
                  <div key={b.id} onClick={() => { setSel(b.id); setTab('clinical'); }} style={{
                    background: isSel ? `${g?.color}12` : '#132040', border: `1px solid ${isSel ? g?.color : '#1e3055'}`,
                    borderRadius: 10, padding: 11, marginBottom: 7, cursor: 'pointer', transition: 'all .15s'
                  }} className="fade-in">
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontSize: 12, fontWeight: 700, fontStyle: 'italic', color: isSel ? g?.color : '#e2e8f0', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{b.name}</div>
                        {b.thai && <div style={{ fontSize: 9, color: '#64748b', marginTop: 1 }}>{b.thai}</div>}
                      </div>
                      <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 3, marginLeft: 8 }}>
                        <span style={{ background: `${g?.color}18`, color: g?.color, border: `1px solid ${g?.color}44`, borderRadius: 8, padding: '1px 7px', fontSize: 9, whiteSpace: 'nowrap' }}>{g?.emoji} {g?.label}</span>
                        {b.importance && IMP_COLOR[b.importance] && <span style={{ background: `${IMP_COLOR[b.importance]}15`, color: IMP_COLOR[b.importance], borderRadius: 8, padding: '1px 7px', fontSize: 9 }}>● {IMP_LABEL[b.importance]}</span>}
                      </div>
                    </div>
                    <div style={{ display: 'flex', gap: 4, marginTop: 6, flexWrap: 'wrap' }}>
                      <span style={{ background: '#0d1526', border: '1px solid #1e3055', borderRadius: 4, padding: '1px 6px', fontSize: 9, color: '#94a3b8' }}>Gram {b.gram}</span>
                      <span style={{ background: '#0d1526', border: '1px solid #1e3055', borderRadius: 4, padding: '1px 6px', fontSize: 9, color: '#94a3b8' }}>{b.morph}</span>
                      {b.tags?.slice(0, 3).map(t => <span key={t} style={{ background: `${g?.color}10`, color: g?.color, borderRadius: 4, padding: '1px 6px', fontSize: 9 }}>{t}</span>)}
                    </div>
                  </div>
                );
              })}
            </div>
            {/* Detail */}
            {selBug && (
              <div style={isMobile ? {
                position: 'fixed',
                inset: 0,
                zIndex: 2000,
                background: '#080e1a',
                overflowY: 'auto',
                animation: 'mobileSheetIn .22s ease-out'
              } : {
                flex: 1,
                overflowY: 'auto',
                background: '#080e1a',
                minWidth: 0
              }} className="fade-in">
                <div style={{ background: `linear-gradient(135deg,${selGrp?.color}15,#0d1526)`, borderBottom: '1px solid #1e3055', padding: isMobile ? '10px 12px' : '14px 18px', position: isMobile ? 'static' : 'sticky', top: 0, zIndex: 10 }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                    <div>
                      <div style={{ fontSize: isMobile ? 14 : 16, fontWeight: 800, fontStyle: 'italic', color: selGrp?.color }}>{selBug.name}</div>
                      {selBug.thai && <div style={{ fontSize: isMobile ? 10 : 11, color: '#94a3b8', marginTop: 2 }}>{selBug.thai}</div>}
                      <div style={{ display: 'flex', gap: 6, marginTop: 6, flexWrap: 'wrap' }}>
                        <span style={{ background: '#132040', border: '1px solid #1e3055', borderRadius: 10, padding: '2px 8px', fontSize: 10, color: '#94a3b8' }}>Gram {selBug.gram} · {selBug.morph}</span>
                        {selBug.importance && <span style={{ background: `${IMP_COLOR[selBug.importance]}15`, color: IMP_COLOR[selBug.importance], borderRadius: 10, padding: '2px 8px', fontSize: 10 }}>● {IMP_LABEL[selBug.importance]}</span>}
                      </div>
                    </div>
                    <button onClick={() => setSel(null)} style={{ background: '#132040', border: '1px solid #1e3055', color: '#94a3b8', borderRadius: 6, padding: isMobile ? '6px 12px' : '4px 10px', fontSize: isMobile ? 13 : 12, cursor: 'pointer', fontWeight: isMobile ? 600 : 500 }}>{isMobile ? '← กลับ' : '✕'}</button>
                  </div>
                  <div style={{ display: 'flex', gap: 4, marginTop: 10, flexWrap: isMobile ? 'wrap' : 'nowrap' }}>
                    {['clinical', 'colony', 'biochem', 'notes'].map(t => (
                      <button key={t} onClick={() => setTab(t)} style={{
                        background: tab === t ? `${selGrp?.color}20` : 'transparent',
                        border: `1px solid ${tab === t ? selGrp?.color : '#1e3055'}`,
                        color: tab === t ? selGrp?.color : '#64748b',
                        borderRadius: 6, padding: '4px 10px', fontSize: 10, cursor: 'pointer', flex: isMobile ? '1 1 calc(50% - 4px)' : '0 0 auto'
                      }}>{t === 'clinical' ? '🏥 Clinical' : t === 'colony' ? '🍽 Colony/Stain' : t === 'biochem' ? '⚗️ Biochemical' : '📝 Notes'}</button>
                    ))}
                  </div>
                </div>
                <div style={{ padding: isMobile ? 10 : 16 }}>
                  {tab === 'clinical' && selBug.clinical && (
                    <div className="fade-in">
                      <InfoCard title="🌍 Natural Habitat" color={selGrp?.color}><p style={{ color: '#94a3b8', fontSize: 12, lineHeight: 1.7, marginTop: 6 }}>{selBug.clinical.habitat}</p></InfoCard>
                      <div style={{ height: 10 }} />
                      <InfoCard title="🦠 Diseases Caused" color={selGrp?.color}>
                        {selBug.clinical.diseases?.map((d, i) => <div key={i} style={{ display: 'flex', gap: 8, marginTop: 4 }}><span style={{ color: selGrp?.color }}>▸</span><span style={{ fontSize: 12, color: '#cbd5e1', lineHeight: 1.5 }}>{d}</span></div>)}
                      </InfoCard>
                      <div style={{ height: 10 }} />
                      <InfoCard title="🔄 Transmission" color={selGrp?.color}><p style={{ color: '#94a3b8', fontSize: 12, lineHeight: 1.7, marginTop: 6 }}>{selBug.clinical.transmission}</p></InfoCard>
                      {selBug.clinical.factors && <><div style={{ height: 10 }} /><InfoCard title="⚡ Virulence Factors" color={selGrp?.color}><p style={{ color: '#94a3b8', fontSize: 12, lineHeight: 1.7, marginTop: 6 }}>{selBug.clinical.factors}</p></InfoCard></>}
                      <div style={{ display: 'flex', gap: 5, flexWrap: 'wrap', marginTop: 12 }}>
                        {selBug.tags?.map(t => <span key={t} style={{ background: `${selGrp?.color}15`, color: selGrp?.color, border: `1px solid ${selGrp?.color}33`, borderRadius: 12, padding: '3px 10px', fontSize: 10 }}>{t}</span>)}
                      </div>
                    </div>
                  )}
                  {tab === 'colony' && (
                    <div className="fade-in">
                      <InfoCard title="🔬 Gram Stain" color={selGrp?.color}><p style={{ color: '#94a3b8', fontSize: 12, lineHeight: 1.7, marginTop: 6 }}>{selBug.gramStain}</p></InfoCard>
                      <div style={{ height: 10 }} />
                      <InfoCard title="🧫 Colony Morphology" color={selGrp?.color}>
                        {Object.entries(selBug.colony || {}).map(([med, desc]) => (
                          <div key={med} style={{ marginTop: 8 }}>
                            <span style={{ fontSize: 11, fontWeight: 700, color: selGrp?.color, background: `${selGrp?.color}15`, padding: '1px 8px', borderRadius: 4 }}>{med}</span>
                            <p style={{ margin: '4px 0 0 0', fontSize: 12, color: '#94a3b8', lineHeight: 1.6 }}>{desc}</p>
                          </div>
                        ))}
                      </InfoCard>
                      <div style={{ height: 10 }} />
                      <InfoCard title="🌡️ Media & Condition" color={selGrp?.color}>
                        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginTop: 8 }}>
                          {selBug.media?.map(m => <span key={m} style={{ background: '#132040', border: '1px solid #1e3055', borderRadius: 6, padding: '3px 10px', fontSize: 11, color: '#cbd5e1' }}>{m}</span>)}
                        </div>
                        <p style={{ color: '#94a3b8', fontSize: 12, marginTop: 8 }}>{selBug.condition}</p>
                      </InfoCard>
                    </div>
                  )}
                  {tab === 'biochem' && (
                    <div className="fade-in">
                      <InfoCard title="⚗️ Key Biochemical Tests" color={selGrp?.color}>
                        <div style={{ overflowX: 'auto', WebkitOverflowScrolling: 'touch' }}>
                        <table style={{ width: '100%', minWidth: isMobile ? 520 : '100%', borderCollapse: 'collapse', fontSize: 11, marginTop: 8 }}>
                          <thead><tr style={{ borderBottom: '1px solid #1e3055' }}>
                            {['Test', 'Result', 'Note'].map(h => <th key={h} style={{ textAlign: 'left', padding: '6px 8px', color: '#64748b', fontWeight: 500 }}>{h}</th>)}
                          </tr></thead>
                          <tbody>
                            {canonicalBiochem.map((row, i) => (
                              <tr key={i} style={{ borderBottom: '1px solid #0d152622', background: i % 2 === 0 ? '#0d1526' : 'transparent' }}>
                                <td style={{ padding: '5px 8px', color: '#cbd5e1', fontWeight: 500 }}>{row.t}</td>
                                <td style={{ padding: '5px 8px' }}>
                                  <span style={{ fontWeight: 700, fontSize: 12, color: row.r.startsWith('+') ? '#4ade80' : row.r.startsWith('−') || row.r.startsWith('-') ? '#f87171' : row.r === 'S' ? '#22d3ee' : row.r === 'R' ? '#f97316' : '#fbbf24' }}>{row.r}</span>
                                </td>
                                <td style={{ padding: '5px 8px', color: '#64748b', fontSize: 10 }}>{row.n}</td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                        </div>
                      </InfoCard>
                    </div>
                  )}
                  {tab === 'notes' && (
                    <InfoCard title="📝 Clinical Notes & Key Points" color={selGrp?.color}>
                      <p style={{ color: '#94a3b8', fontSize: 12, lineHeight: 1.8, marginTop: 8 }}>{selBug.notes}</p>
                    </InfoCard>
                  )}
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ══════════════════════════════════════
    // PAGE: WORKFLOW
    // ══════════════════════════════════════
    const GRAM_OPTIONS = [
      { id: 'gpc_cluster', label: 'GPC in clusters (เช่น Staphylococcus)', color: '#c084fc' },
      { id: 'gpc_chain', label: 'GPC in chains (เช่น Streptococcus)', color: '#4ade80' },
      { id: 'gpc_diplo', label: 'GP Diplococci (lancet-shaped)', color: '#34d399' },
      { id: 'gpb', label: 'GP Bacilli (Gram positive รูปแท่ง)', color: '#fb923c' },
      { id: 'gnb_oxi_neg', label: 'GN Rods + Oxidase − (Enterobacterales)', color: '#f87171' },
      { id: 'gnb_oxi_pos_tcbs', label: 'GN Rods + Oxidase + + TCBS+ (Vibrio)', color: '#38bdf8' },
      { id: 'gnb_oxi_pos_nfb', label: 'GN Rods + Oxidase + + TSI K/N (NFB)', color: '#22d3ee' },
      { id: 'gn_diplo', label: 'GN Diplococci/Coccobacilli', color: '#a3e635' },
    ];
    const GROUP_MAP = { gpc_cluster: 'gpc_cluster', gpc_chain: 'gpc_chain', gpc_diplo: 'gpc_chain', gpb: 'gpb', gnb_oxi_neg: 'enterobacterales', gnb_oxi_pos_tcbs: 'vibrio', gnb_oxi_pos_nfb: 'nfb', gn_diplo: 'gn_coccobacilli' };

    function WorkflowPage({ initData, setWfData, showPrompt, showAlert, user, isGuest }) {
      const [step, setStep] = useState(initData?.step || 1);
      const [gramSel, setGramSel] = useState(initData?.gramSel || null);
      const [answers, setAnswers] = useState(initData?.answers || {});
      const [results, setResults] = useState(initData?.results || null);
      const [caseName, setCaseName] = useState(initData?.caseName || '');

      const dbGroup = gramSel ? GROUP_MAP[gramSel] : null;
      const suite = dbGroup ? SUITES[dbGroup] : null;

      const setCurrent = () => {
        const data = { step, gramSel, answers, results, caseName };
        setWfData(data);
      };

      const executeSave = async (finalName) => {
        if (!finalName || !finalName.trim()) return;
        setCaseName(finalName);
        const id = Date.now();
        const entry = { id, name: finalName, date: new Date().toLocaleDateString('th-TH'), gramSel, answers, results, step };

        // Save to LocalStorage (only if not guest mode)
        if (!isGuest) {
          const saved = JSON.parse(localStorage.getItem('mbcases') || '[]');
          saved.unshift(entry);
          localStorage.setItem('mbcases', JSON.stringify(saved.slice(0, 50)));
        }

        // Save to Firestore if available
        if (isFirebaseActive && user) {
          try {
            await db.collection('users').doc(user.uid).collection('cases').doc(id.toString()).set(entry);
          } catch (e) { console.error('Firestore save error', e); }
        }

        if (showAlert) showAlert('✅ บันทึกสำเร็จ', isGuest ? `ข้อมูลของเคส "${finalName}" ถูกบันทึกไว้ในเซสชันนี้เท่านั้น (Guest Mode)` : `ข้อมูลของเคส "${finalName}" ถูกบันทึกลงระบบเรียบร้อยแล้วครับ!`);
        else alert('บันทึก Case เรียบร้อย!');
      };

      const saveCase = () => {
        let finalName = caseName;
        if (!finalName.trim()) {
          showPrompt('ตั้งชื่อ Case สำหรับบันทึก:', 'Case ' + new Date().toLocaleTimeString('th-TH'), (name) => {
            executeSave(name);
          });
        } else {
          executeSave(finalName);
        }
      };

      const reset = () => { setStep(1); setGramSel(null); setAnswers({}); setResults(null); setCaseName(''); };

      const runAnalysis = () => {
        if (!dbGroup) return;
        const r = calcProbability(dbGroup, answers);
        setResults(r);
        setStep(3);
      };

      return (
        <div style={{ display: 'flex', flexDirection: 'column', height: 'calc(100vh - 56px)' }}>
          {/* Progress Stepper - Simple 3 Steps */}
          <div className="progress-bar" style={{ flexShrink: 0 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, maxWidth: 800, margin: '0 auto' }}>
              {[{ n: 1, l: 'Gram Stain', icon: '🔬' }, { n: 2, l: 'Biochemical Tests', icon: '⚗️' }, { n: 3, l: 'ผลการวินิจฉัย', icon: '📊' }].map((s, i, arr) => (
                <React.Fragment key={s.n}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                    <div className={`step-indicator ${step >= s.n ? 'done' : 'pending'}`}>
                      {step > s.n ? '✓' : s.n}
                    </div>
                    <span style={{ fontSize: 12, color: step === s.n ? '#e2e8f0' : '#64748b', fontWeight: step === s.n ? 700 : 400 }}>{s.l}</span>
                  </div>
                  {i < arr.length - 1 && <div style={{ flex: 1, height: 1, background: step > s.n ? 'rgba(99,102,241,0.3)' : 'rgba(255,255,255,0.06)' }} />}
                </React.Fragment>
              ))}
              <button onClick={reset} className="btn-action secondary" style={{ marginLeft: 'auto', padding: '6px 14px', fontSize: 12 }}>🔄 เริ่มใหม่</button>
            </div>
          </div>

          <div style={{ flex: 1, overflowY: 'auto', padding: '24px 20px' }} className="fade-in">
            <div style={{ maxWidth: 800, margin: '0 auto', width: '100%' }}>
            {/* STEP 1 */}
            {step === 1 && (
              <div>
                <h2 style={{ fontSize: 20, fontWeight: 800, color: '#fff', marginBottom: 6, letterSpacing: '-0.5px' }}>🔬 Step 1 — Gram Stain</h2>
                <p style={{ color: '#64748b', fontSize: 13, marginBottom: 24, lineHeight: 1.5 }}>เลือกผลที่ได้จากการย้อม Gram stain</p>
                <div style={{ display: 'grid', gap: 8 }}>
                  {GRAM_OPTIONS.map(opt => (
                    <button key={opt.id} onClick={() => { setGramSel(opt.id); setAnswers({}); }}
                      className={`gram-card ${gramSel === opt.id ? 'selected' : ''}`}
                      style={gramSel === opt.id ? { background: `${opt.color}12`, borderColor: opt.color, color: opt.color } : {}}>
                      <div className="gram-indicator" style={gramSel === opt.id ? { background: opt.color } : {}}>
                        {gramSel === opt.id && <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>}
                      </div>
                      {opt.label}
                    </button>
                  ))}
                </div>
                {gramSel && (
                  <div style={{ marginTop: 24 }}>
                    <InfoCard title="💡 Suite ที่แนะนำ" color="#6366f1">
                      <p style={{ color: '#94a3b8', fontSize: 13, marginTop: 6 }}>{suite?.name || 'ไม่พบ suite สำหรับกลุ่มนี้'}</p>
                      <p style={{ color: '#64748b', fontSize: 11, marginTop: 4 }}>Trigger: {suite?.trigger}</p>
                    </InfoCard>
                    <button onClick={() => setStep(2)} className="btn-action primary" style={{ marginTop: 16, width: '100%', padding: '14px 28px', fontSize: 15 }}>
                      ดำเนินการต่อ → กรอกผล Biochemical Tests
                    </button>
                  </div>
                )}
              </div>
            )}

            {/* STEP 2 */}
            {step === 2 && suite && (
              <div>
                <h2 style={{ fontSize: 20, fontWeight: 800, color: '#fff', marginBottom: 6, letterSpacing: '-0.5px' }}>⚗️ Step 2 — {suite.name}</h2>
                <p style={{ color: '#64748b', fontSize: 13, marginBottom: 20, lineHeight: 1.5 }}>กรอกผลการทดสอบให้มากที่สุดเท่าที่มี (ข้ามได้ถ้ายังไม่ได้ทำ)</p>
                <div style={{ marginBottom: 20 }}>
                  <label style={{ fontSize: 12, color: '#94a3b8', display: 'block', marginBottom: 6, fontWeight: 500 }}>📋 ชื่อ Case (สำหรับบันทึก)</label>
                  <input value={caseName} onChange={e => setCaseName(e.target.value)} placeholder="เช่น Case 001 — ผู้ป่วย UTI" className="input-field" style={{ fontSize: 13 }} />
                </div>
                <div style={{ display: 'grid', gap: 8 }}>
                  {suite.tests.map((test, idx) => (
                    <div key={test.id} className={`wf-test-card ${answers[test.id] ? 'answered' : ''} ${test.extra ? 'extra-card' : ''}`}>
                      <div className="wf-test-label"><span className="idx">{idx + 1}</span> {test.label}{test.extra && <span className="extra-badge">เพิ่มเติม</span>}</div>
                      <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                        <button onClick={() => setAnswers(a => ({ ...a, [test.id]: undefined }))}
                          className={`wf-opt-btn skip ${!answers[test.id] ? 'selected' : ''}`}>— ยังไม่ทำ</button>
                        {test.options.map(opt => (
                          <button key={opt} onClick={() => setAnswers(a => ({ ...a, [test.id]: opt }))}
                            className={`wf-opt-btn ${answers[test.id] === opt ? 'selected' : ''}`}>{opt}</button>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
                <div style={{ display: 'flex', gap: 10, marginTop: 24 }}>
                  <button onClick={() => setStep(1)} className="btn-action secondary">← ย้อนกลับ</button>
                  <button onClick={runAnalysis} className="btn-action primary" style={{ flex: 1 }}>
                    🔍 วิเคราะห์ผล (Identify Organism)
                  </button>
                  <button onClick={saveCase} className="btn-action save">💾 บันทึก</button>
                </div>
              </div>
            )}

            {/* STEP 3 */}
            {step === 3 && results && (
              <div>
                <h2 style={{ fontSize: 20, fontWeight: 800, color: '#fff', marginBottom: 6, letterSpacing: '-0.5px' }}>📊 Step 3 — ผลการวินิจฉัย</h2>
                <p style={{ color: '#64748b', fontSize: 13, marginBottom: 24, lineHeight: 1.5 }}>คะแนนความน่าจะเป็นในการจำแนกชนิดเชื้อ จากผล biochemical ที่กรอก</p>
                <div style={{ display: 'grid', gap: 12 }}>
                  {results.slice(0, 5).map((bug, i) => {
                    const g = GROUPS.find(x => x.id === bug.group);
                    return (
                      <div key={bug.id} className={`result-card ${i === 0 ? 'top' : ''}`} style={i === 0 ? { borderColor: `${g?.color}44` } : {}}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 14, marginBottom: 10 }}>
                          <div style={{ width: 40, height: 40, borderRadius: 12, background: `${g?.color}18`, border: `1px solid ${g?.color}33`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 15, fontWeight: 800, color: g?.color, flexShrink: 0 }}>#{i + 1}</div>
                          <div style={{ flex: 1, minWidth: 0 }}>
                            <div style={{ fontSize: 14, fontWeight: 700, fontStyle: 'italic', color: i === 0 ? g?.color : '#e2e8f0', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{bug.name}</div>
                            {bug.thai && <div style={{ fontSize: 11, color: '#64748b', marginTop: 1 }}>{bug.thai}</div>}
                          </div>
                          <div style={{ textAlign: 'right', flexShrink: 0 }}>
                            <div style={{ fontSize: 22, fontWeight: 800, color: bug.pct >= 70 ? '#4ade80' : bug.pct >= 40 ? '#fbbf24' : '#f87171', lineHeight: 1 }}>{bug.pct}%</div>
                            <div style={{ fontSize: 9, color: '#64748b', marginTop: 2 }}>probability</div>
                          </div>
                        </div>
                        <div style={{ background: 'rgba(0,0,0,0.3)', borderRadius: 8, height: 6, overflow: 'hidden' }}>
                          <div style={{ height: '100%', width: `${bug.pct}%`, background: bug.pct >= 70 ? 'linear-gradient(90deg,#4ade80,#22d3ee)' : bug.pct >= 40 ? 'linear-gradient(90deg,#fbbf24,#fb923c)' : '#f87171', transition: 'width .6s cubic-bezier(.4,0,.2,1)', borderRadius: 8 }} />
                        </div>
                        {i === 0 && bug.pct >= 50 && (
                          <div style={{ marginTop: 12, background: 'rgba(99,102,241,.08)', border: '1px solid rgba(99,102,241,.2)', borderRadius: 10, padding: '10px 14px' }}>
                            <div style={{ fontSize: 10, fontWeight: 700, color: '#818cf8', marginBottom: 4, letterSpacing: 0.5 }}>KEY POINTS</div>
                            <p style={{ fontSize: 12, color: '#94a3b8', lineHeight: 1.6 }}>{bug.notes?.substring(0, 200)}...</p>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
                <div style={{ display: 'flex', gap: 10, marginTop: 24 }}>
                  <button onClick={() => setStep(2)} className="btn-action secondary">← แก้ไขผล</button>
                  <button onClick={saveCase} className="btn-action save" style={{ flex: 1 }}>💾 บันทึก Case นี้</button>
                  <button onClick={reset} className="btn-action primary" style={{ flex: 0 }}>🔄 Case ใหม่</button>
                </div>
              </div>
            )}
            </div>
          </div>
        </div>
      );
    }

    // PAGE: SAVED CASES
    // ══════════════════════════════════════
    function CasesPage({ onLoad, showPrompt, user, isGuest }) {
      const [cases, setCases] = useState(() => isGuest ? [] : JSON.parse(localStorage.getItem('mbcases') || '[]'));
      const [loading, setLoading] = useState(false);
      const [deleteConfirm, setDeleteConfirm] = useState(null);

      useEffect(() => {
        if (isGuest) {
          setCases([]);
          return;
        }
        if (isFirebaseActive && user) {
          setLoading(true);
          db.collection('users').doc(user.uid).collection('cases').orderBy('id', 'desc').get().then(snap => {
            const cloudCases = snap.docs.map(doc => doc.data());
            setCases(cloudCases);
            localStorage.setItem('mbcases', JSON.stringify(cloudCases));
            setLoading(false);
          }).catch(e => {
            console.error(e); setLoading(false);
          });
        }
      }, [user, isGuest]);

      const del = async id => {
        setDeleteConfirm(id);
      };

      const confirmDelete = async () => {
        if (!deleteConfirm) return;
        const updated = cases.filter(c => c.id !== deleteConfirm);
        setCases(updated);
        if (!isGuest) {
          localStorage.setItem('mbcases', JSON.stringify(updated));
        }
        if (isFirebaseActive && user) {
          try { await db.collection('users').doc(user.uid).collection('cases').doc(deleteConfirm.toString()).delete(); } catch (e) { }
        }
        setDeleteConfirm(null);
      };

      const rename = (id, oldName) => {
        showPrompt('แก้ไขชื่อ Case:', oldName, async (newName) => {
          if (!newName || !newName.trim()) return;
          const t = newName.trim();
          const updated = cases.map(c => c.id === id ? { ...c, name: t } : c);
          setCases(updated);
          if (!isGuest) {
            localStorage.setItem('mbcases', JSON.stringify(updated));
          }
          if (isFirebaseActive && user) {
            try { await db.collection('users').doc(user.uid).collection('cases').doc(id.toString()).update({ name: t }); } catch (e) { }
          }
        });
      };

      const EmptyState = () => (
        <div style={{ textAlign: 'center', padding: '80px 20px', background: 'rgba(255,255,255,0.02)', border: '1px dashed var(--surface-border)', borderRadius: '16px', marginTop: 40, maxWidth: 800, margin: '40px auto 0' }}>
          <div style={{ fontSize: 56, marginBottom: 16 }}>📂</div>
          <h3 style={{ color: '#fff', fontSize: 18, fontWeight: 600 }}>ยังไม่มีเคสที่ถูกบันทึกไว้</h3>
          <p style={{ color: 'var(--text2)', fontSize: 14, marginTop: 8 }}>ข้อมูลเชื้อที่คุณเลือกบันทึกจะถูกเก็บรวบรวมไว้ที่นี่</p>
        </div>
      );

      return (
        <div className="fade-in cases-container" style={{ padding: '40px', maxWidth: 1200, margin: '0 auto', height: 'calc(100vh - 60px)', overflowY: 'auto' }}>
          <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', marginBottom: 32, paddingBottom: 20, borderBottom: '1px solid var(--surface-border)' }}>
            <div>
              <h2 style={{ fontSize: 26, fontWeight: 700, color: '#fff', letterSpacing: '-0.5px' }}>
                Case ที่บันทึกไว้
              </h2>
              <p style={{ color: 'var(--text3)', fontSize: 13, marginTop: 6, fontWeight: 500, letterSpacing: 0.5, textTransform: 'uppercase' }}>
                {isGuest ? '👤 Guest Mode (No Persistence)' : (user ? '☁️ Cloud Sync Active' : '💾 Local Storage')}
              </p>
            </div>
            <div style={{ color: 'var(--text2)', fontSize: 14, fontWeight: 600 }}>ทั้งหมด {cases.length} เคส</div>
          </div>

          {loading && <div style={{ textAlign: 'center', color: 'var(--accent)', padding: 40, fontWeight: 600 }}>กำลังดึงข้อมูลจากระบบ Cloud...</div>}

          {!loading && cases.length === 0 && <EmptyState />}
          
          <div className="cases-grid" style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(340px, 1fr))', gap: 24 }}>
            {cases.map(c => {
              const g = GROUPS.find(x => x.id === GROUP_MAP[c.gramSel]);
              return (
                <div key={c.id} style={{ background: 'var(--surface)', border: '1px solid var(--surface-border)', borderRadius: 16, overflow: 'hidden', display: 'flex', flexDirection: 'column', transition: 'all .2s' }} className="fade-in card-hover">
